<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Aveyo"/>
<meta name="theme-color" content="#185FA5"/>
<title>Aveyo Solar v21</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;--green-light:#EAF3DE;--green-dark:#27500A;--amber-light:#FAEEDA;--amber-dark:#633806;--red-light:#FCEBEB;--red-dark:#791F1F;--purple-light:#EEEDFE;--purple-dark:#3C3489;--teal-light:#E1F5EE;--teal-dark:#085041;--pink-light:#FBEAF0;--pink-dark:#72243E;--gray-light:#F1EFE8;--gray-dark:#444441;--bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);--radius:8px;--radius-lg:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#262624;--bg3:#2e2e2b;--text:#f0efea;--text2:#a8a79f;--text3:#6e6d67;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--blue-light:#0c3d6b;--blue-dark:#90c4f0;--green-light:#1a3a0a;--green-dark:#a8d870;--amber-light:#3d2a05;--amber-dark:#f5c060;--red-light:#3d1010;--red-dark:#f09090;--purple-light:#26215C;--purple-dark:#AFA9EC;--teal-light:#04342C;--teal-dark:#5DCAA5;--pink-light:#4B1528;--pink-dark:#ED93B1;--gray-light:#2e2e2b;--gray-dark:#c8c7bf}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:5rem}
.hdr{background:var(--blue);color:#fff;padding:1rem 1rem .875rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.hdr-title{font-size:16px;font-weight:600}
.hdr-sub{font-size:12px;opacity:.75;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:12px;padding:5px 10px;border-radius:var(--radius);cursor:pointer;font-family:inherit}
.hdr-cache{font-size:10px;opacity:.65;white-space:nowrap}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:.5px solid var(--border2);display:flex;z-index:200}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 14px;cursor:pointer;border:none;background:transparent;font-family:inherit;gap:3px}
.bnav-btn svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.8}
.bnav-btn span{font-size:10px;color:var(--text3);font-weight:500}
.bnav-btn.active svg{stroke:var(--blue)}
.bnav-btn.active span{color:var(--blue)}
.section-card{background:var(--bg);border-radius:var(--radius-lg);margin:.75rem;padding:1.25rem;border:.5px solid var(--border)}
.field{margin-bottom:.875rem}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.field input{width:100%;padding:10px 12px;font-size:14px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit}
.field input:focus{border-color:var(--blue)}
.btn{width:100%;padding:11px;border-radius:var(--radius);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--bg2);color:var(--text);border:.5px solid var(--border2);margin-top:8px}
.btn-outline{background:transparent;color:var(--blue);border:.5px solid var(--blue);margin-top:8px}
.msg{font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.msg-error{color:#c0392b}.msg-success{color:#27ae60}.msg-info{color:var(--text2)}
.sec-label{font-size:13px;font-weight:700;color:var(--text);padding:1rem .75rem .5rem;letter-spacing:.01em}
.wgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:0 .75rem .5rem}
.w{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem;cursor:pointer;position:relative}
.w:active{border-color:var(--blue)}
.w-arrow{position:absolute;top:10px;right:10px;font-size:16px;color:var(--text3)}
.w-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;line-height:1.4;padding-right:18px}
.w-num{font-size:36px;font-weight:700;line-height:1}
.w-num.blue{color:var(--blue)}.w-num.green{color:#3B6D11}.w-num.amber{color:var(--amber-dark)}.w-num.red{color:#A32D2D}.w-num.def{color:var(--text)}
.w-spin{display:inline-block;width:22px;height:22px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-top:4px}
.w-wide{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);margin:0 .75rem .5rem;padding:1rem;cursor:pointer;position:relative}
.w-wide:active{border-color:var(--blue)}
.w-wide .w-title{margin-bottom:6px;padding-right:18px}
.search-wrap{margin:.75rem}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-lg);padding:10px 14px}
.search-box svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0}
.search-box input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);outline:none;font-family:inherit}
.search-box input::placeholder{color:var(--text3)}
.chips{display:flex;gap:6px;overflow-x:auto;padding:0 .75rem .75rem;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:99px;border:.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.active{color:#fff;border-color:transparent}
.cards{padding:0 .75rem}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.125rem;margin-bottom:.625rem;cursor:pointer}
.card:active{border-color:var(--blue)}
.card-id{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.04em;margin-bottom:2px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px}
.card-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.card-addr{font-size:12px;color:var(--text2);margin-bottom:5px}
.card-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}
.meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.meta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.meta.warn{color:var(--amber-dark);font-weight:500}
.card-note{font-size:11px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:6px 8px;margin-top:7px;line-height:1.5;border-left:2px solid var(--blue)}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0;font-weight:600}
.ms-packet{background:var(--purple-light);color:var(--purple-dark)}
.ms-survey{background:var(--amber-light);color:var(--amber-dark)}
.ms-design{background:var(--pink-light);color:var(--pink-dark)}
.ms-ntp,.ms-scope,.ms-install{background:var(--blue-light);color:var(--blue-dark)}
.ms-utility{background:var(--teal-light);color:var(--teal-dark)}
.ms-permit{background:var(--amber-light);color:var(--amber-dark)}
.ms-inspect{background:var(--purple-light);color:var(--purple-dark)}
.ms-pto{background:var(--teal-light);color:var(--teal-dark)}
.ms-complete{background:var(--green-light);color:var(--green-dark)}
.ms-hold,.ms-cancel{background:var(--red-light);color:var(--red-dark)}
.ms-default{background:var(--gray-light);color:var(--gray-dark)}
.collapsible{background:var(--bg);border-radius:var(--radius-lg);margin:0 .75rem .625rem;border:.5px solid var(--border);overflow:hidden}
.coll-hdr{display:flex;justify-content:space-between;align-items:center;padding:.875rem 1rem;cursor:pointer;user-select:none}
.coll-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.coll-title .cnt{background:var(--bg2);color:var(--text3);font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500}
.coll-arrow{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.collapsible.open .coll-arrow{transform:rotate(180deg)}
.coll-body{display:none;border-top:.5px solid var(--border)}
.collapsible.open .coll-body{display:block}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 1rem;border-bottom:.5px solid var(--border);font-size:13px;gap:12px}
.drow:last-child{border-bottom:none}
.dk{color:var(--text2);flex-shrink:0;max-width:45%}
.dv{color:var(--text);text-align:right;word-break:break-word;max-width:53%}
.te{padding:10px 1rem;border-bottom:.5px solid var(--border);font-size:12px;line-height:1.5}
.te:last-child{border-bottom:none}
.te-date{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.te-body{color:var(--text2);margin-top:2px}
.te-status{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;margin-top:4px;font-weight:500}
.ts-complete{background:var(--green-light);color:var(--green-dark)}
.ts-assigned{background:var(--amber-light);color:var(--amber-dark)}
.ts-open{background:var(--blue-light);color:var(--blue-dark)}
.notes-body{padding:.875rem 1rem;font-size:13px;line-height:1.6;color:var(--text2)}
.back-bar{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--blue);cursor:pointer;margin:.75rem;font-weight:500}
.back-bar svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.detail-hdr{margin:0 .75rem .75rem}
.detail-id{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.04em;margin-bottom:3px}
.detail-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.detail-addr{font-size:13px;color:var(--text2);margin-bottom:8px}
.loading{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .875rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:14px;line-height:1.6}
.progress-wrap{width:200px;margin:10px auto 0;background:rgba(0,0,0,.1);border-radius:99px;height:4px;overflow:hidden}
.progress-bar{height:4px;background:var(--blue);border-radius:99px;transition:width .3s}
.rate-msg{background:var(--amber-light);color:var(--amber-dark);border-radius:var(--radius);padding:.75rem 1rem;margin:.75rem;font-size:12px;line-height:1.5;text-align:center}
.wl-header{background:var(--bg);border-bottom:.5px solid var(--border);padding:.875rem 1rem}
.wl-title{font-size:15px;font-weight:700;color:var(--text)}
.wl-count{font-size:12px;color:var(--text3);margin-top:2px}
.view{display:none}.view.active{display:block}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-logo"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
    <div style="flex:1;min-width:0"><div class="hdr-title">Aveyo Solar</div><div class="hdr-sub" id="hdr-sub">v21</div></div>
    <div class="hdr-right">
      <span class="hdr-cache" id="cache-label"></span>
      <button class="hdr-btn" id="btn-refresh" style="display:none">Refresh</button>
      <button class="hdr-btn" id="btn-logout" style="display:none">Sign out</button>
    </div>
  </div>

  <!-- AUTH -->
  <div id="view-auth" class="view active">
    <div class="section-card" style="margin-top:.75rem">
      <div style="font-size:14px;font-weight:600;margin-bottom:.875rem">Sign in to Podio</div>
      <div class="field"><label>Username</label><input type="email" id="auth-user" autocomplete="email"/></div>
      <div class="field"><label>Password</label><input type="password" id="auth-pass" autocomplete="current-password"/></div>
      <button class="btn btn-primary" id="btn-connect">Sign in</button>
      <div class="msg msg-info" id="auth-msg"></div>
    </div>
  </div>

  <!-- HOME -->
  <div id="view-home" class="view"><div id="home-content"></div></div>

  <!-- WIDGET LIST -->
  <div id="view-wlist" class="view">
    <div class="back-bar" id="wlist-back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>Back to Dashboard
    </div>
    <div class="wl-header">
      <div class="wl-title" id="wl-title"></div>
      <div class="wl-count" id="wl-count"></div>
    </div>
    <div class="cards" style="padding-top:.75rem">
      <div id="wl-loading" class="loading" style="display:none"><div class="spinner"></div>Loading projects...</div>
      <div id="wl-list"></div>
    </div>
  </div>

  <!-- PROJECTS -->
  <div id="view-projects" class="view">
    <div class="search-wrap" style="margin-top:.75rem">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search by name, address, milestone..."/>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:0 .75rem .75rem" id="proj-stats"></div>
    <div class="chips" id="filter-chips"></div>
    <div class="cards">
      <div class="loading" id="cards-loading" style="display:none"><div class="spinner"></div><div id="loading-msg">Loading...</div><div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:5%"></div></div></div>
      <div id="cards-list"></div>
    </div>
    <div style="padding:0 .75rem;margin-top:.5rem"><button class="btn btn-secondary" id="proj-signout" style="font-size:12px">Sign out</button></div>
  </div>

  <!-- DETAIL -->
  <div id="view-detail" class="view">
    <div class="back-bar" id="detail-back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
      <span id="detail-back-label">Back</span>
    </div>
    <div id="detail-body"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav" id="bnav" style="display:none">
    <button class="bnav-btn active" id="nav-home">
      <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span>
    </button>
    <button class="bnav-btn" id="nav-projects">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>Projects</span>
    </button>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const PODIO={appId:29839792,viewId:61731109,cid:'google-sheets-sync-kqxsb2',csec:'WSRPgu0EuzhzTpvkVzfygSnmSZRmqnfYH8rfQJY4dHbDG7DFdgQ1mldX2nV3cAKo',user:'q.spencer@aveyo.com',pass:'Clippers332!'};

// [label, appId, viewId, warnAt, dangerAt, isWide, section]
const WIDGETS=[
  ['My Total Projects',          29839792,61731109,999,9999,false,'Projects'],
  ['Pipeline Review Not Set',    29839792,61743306,1,3,    false,null],
  ['Project Review Needed',      29839792,61743302,5,15,   true, null],
  ['Total in SOW',               29839685,61743309,999,9999,false,'Scope of Work'],
  ['Ready for SOW',              29839685,61743307,1,3,    false,null],
  ['SOW Rejections',             29839685,61743308,1,3,    false,null],
  ['Ready to Send Rep SOW',      29839685,61743310,1,3,    false,null],
  ['Projects w/ No Redlines',    29839685,61743311,1,3,    false,null],
  ['Rep SOW Pending Approval',   29839685,61743313,1,3,    false,null],
  ['Customer SOW Rejections',    29839685,61743314,1,2,    false,null],
  ['Customer SOW Sent',          29839685,61743315,999,9999,false,null],
  ['Ready to Send Cust SOW',     29839685,61743332,1,3,    false,null],
  ['Roof Review Needed (SOW)',    29839685,61743312,1,3,    false,null],
  ['Ready for Pre-Install',      29839773,61743334,1,5,    false,'Pre-Install'],
  ['Issues w/ Pre-Install',      29839773,61743335,1,3,    false,null],
  ['Design Change Orders',       29841104,61743336,1,5,    false,'Change Orders'],
  ['Customer Update Needed',     29839792,61743343,5,15,   false,'Communication'],
  ['Rep Update Needed',          29839792,61743344,3,8,    false,null],
  ['Roof Review Needed',         29839741,61743345,1,3,    false,'Roof Work'],
];

const FIELD={status:266489985,milestone:269930958,lastReview:275467370,notes:275751845,funding:268433601,lender:266828352,finance:274492780,daysSince:276204428,comments:266495555,workOrders:266494683,tickets:267693531};
const CACHE_TTL=10*60*1000;

// ── STATE ────────────────────────────────────────────────
let TOKEN=null;
let ALL_ITEMS=[];       // projects tab
let WLIST_ITEMS=[];     // widget list items
let FILTER='All';
let PREV_VIEW='home';   // where detail came from
let WLIST_LABEL='';

// ── PERSIST ──────────────────────────────────────────────
function saveToken(t){try{localStorage.setItem('aveyo_tok',t||'');}catch(e){}}
function loadToken(){try{return localStorage.getItem('aveyo_tok')||null;}catch(e){return null;}}
function clearToken(){try{localStorage.removeItem('aveyo_tok');}catch(e){}}

// ── VIEW MANAGEMENT ──────────────────────────────────────
const SUBS={home:'Dashboard',projects:'My Projects',wlist:'',detail:'Project Detail',auth:'Sign In'};
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const isAuth=(v==='auth');
  document.getElementById('btn-logout').style.display=isAuth?'none':'block';
  document.getElementById('btn-refresh').style.display=(v==='home'||v==='projects')?'block':'none';
  document.getElementById('bnav').style.display=isAuth?'none':'flex';
  document.getElementById('hdr-sub').textContent=v==='wlist'?WLIST_LABEL:(SUBS[v]||'');
}
function setActiveNav(tab){
  document.getElementById('nav-home').classList.toggle('active',tab==='home');
  document.getElementById('nav-projects').classList.toggle('active',tab==='projects');
}

// ── EVENT WIRING (no inline onclick) ─────────────────────
document.getElementById('btn-connect').addEventListener('click',doSignIn);
document.getElementById('btn-logout').addEventListener('click',doLogout);
document.getElementById('btn-refresh').addEventListener('click',doRefresh);
document.getElementById('nav-home').addEventListener('click',()=>{setActiveNav('home');showView('home');loadHome();});
document.getElementById('nav-projects').addEventListener('click',()=>{setActiveNav('projects');showView('projects');if(!ALL_ITEMS.length)loadProjects();});
document.getElementById('wlist-back').addEventListener('click',()=>{showView('home');setActiveNav('home');});
document.getElementById('detail-back').addEventListener('click',()=>{showView(PREV_VIEW);setActiveNav(PREV_VIEW==='projects'?'projects':'home');});
document.getElementById('proj-signout').addEventListener('click',doLogout);
document.getElementById('search-input').addEventListener('input',renderCards);

// Widget clicks (delegated)
document.getElementById('home-content').addEventListener('click',function(e){
  const w=e.target.closest('[data-widget]');
  if(w){openWidgetList(parseInt(w.dataset.wi));}
});
// Widget list card clicks (delegated)
document.getElementById('wl-list').addEventListener('click',function(e){
  const c=e.target.closest('[data-itemid]');
  if(c){PREV_VIEW='wlist';openDetail(parseInt(c.dataset.itemid));}
});
// Projects card clicks (delegated)
document.getElementById('cards-list').addEventListener('click',function(e){
  const c=e.target.closest('[data-itemid]');
  if(c){PREV_VIEW='projects';openDetail(parseInt(c.dataset.itemid));}
});
// Chip clicks (delegated)
document.getElementById('filter-chips').addEventListener('click',function(e){
  const chip=e.target.closest('[data-chip]');
  if(chip){FILTER=chip.dataset.chip;renderChips();renderCards();}
});
// Collapsible toggle (delegated on document)
document.addEventListener('click',function(e){
  const hdr=e.target.closest('.coll-hdr');
  if(hdr)hdr.closest('.collapsible').classList.toggle('open');
});

// ── AUTH ─────────────────────────────────────────────────
async function doSignIn(){
  const user=document.getElementById('auth-user').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const msg=document.getElementById('auth-msg');
  const btn=document.getElementById('btn-connect');
  msg.className='msg msg-info';msg.textContent='Signing in...';btn.disabled=true;
  try{
    const res=await fetch('https://podio.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'password',username:user,password:pass,client_id:PODIO.cid,client_secret:PODIO.csec})});
    const d=await res.json();
    if(!d.access_token)throw new Error(d.error_description||'Sign in failed');
    TOKEN=d.access_token;saveToken(TOKEN);
    document.getElementById('bnav').style.display='flex';
    setActiveNav('home');showView('home');loadHome();
  }catch(e){msg.className='msg msg-error';msg.textContent=e.message;}
  btn.disabled=false;
}
function doLogout(){
  TOKEN=null;ALL_ITEMS=[];WLIST_ITEMS=[];FILTER='All';
  clearToken();clearCache();
  document.getElementById('cache-label').textContent='';
  document.getElementById('auth-user').value=PODIO.user;
  document.getElementById('auth-pass').value=PODIO.pass;
  document.getElementById('bnav').style.display='none';
  showView('auth');
}
function doRefresh(){
  const active=document.querySelector('.view.active');
  if(!active)return;
  if(active.id==='view-home'){clearCache();loadHome();}
  else if(active.id==='view-projects'){ALL_ITEMS=[];loadProjects();}
}

// ── CACHE ─────────────────────────────────────────────────
const CACHE={};
function clearCache(){Object.keys(CACHE).forEach(k=>delete CACHE[k]);}
function cGet(k){const c=CACHE[k];return c&&Date.now()-c.ts<CACHE_TTL?c.v:null;}
function cSet(k,v){CACHE[k]={v,ts:Date.now()};}

// ── API HELPERS ──────────────────────────────────────────
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
async function podioPost(url,body){
  const res=await fetch(url,{method:'POST',headers:{Authorization:'OAuth2 '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await res.json();
  if(d.error==='rate_limit')throw Object.assign(new Error('Rate limit — wait ~1 hour'),{rateLimit:true});
  if(!res.ok)throw new Error(d.error_description||'HTTP '+res.status);
  return d;
}
async function fetchCount(appId,viewId){
  const key=appId+'_'+viewId;
  const cached=cGet(key);if(cached!==null)return{n:cached,fresh:false};
  const d=await podioPost(`https://api.podio.com/item/app/${appId}/filter/${viewId}/`,{limit:1,offset:0});
  const n=d.filtered!==undefined?d.filtered:(d.total!==undefined?d.total:'—');
  cSet(key,n);return{n,fresh:true};
}
async function fetchAllItems(appId,viewId){
  let all=[],offset=0,total=null;
  while(true){
    const d=await podioPost(`https://api.podio.com/item/app/${appId}/filter/${viewId}/`,{limit:100,offset,sort_by:'last_edit_on',sort_desc:true});
    if(d.filtered!==undefined&&total===null)total=d.filtered;
    else if(d.total!==undefined&&total===null)total=d.total;
    all=all.concat(d.items||[]);
    if((d.items||[]).length<100||(total!==null&&all.length>=total))break;
    offset+=100;
  }
  return all;
}

// ── COLOR HELPERS ────────────────────────────────────────
function numColor(n,w,d){if(n==='—'||n===undefined)return 'def';if(n>=d)return 'red';if(n>=w)return 'amber';if(n===0)return 'green';return 'blue';}

// ── HOME DASHBOARD ───────────────────────────────────────
function buildHomeShell(){
  let html='';let lastSec='';let gridOpen=false;
  WIDGETS.forEach(([label,appId,viewId,w,d,isWide,sec],i)=>{
    const cached=cGet(appId+'_'+viewId);
    const numHtml=cached!==null?`<div class="w-num ${numColor(cached,w,d)}">${cached}</div>`:`<div class="w-spin" id="spin_${i}"></div>`;
    if(sec&&sec!==lastSec){if(gridOpen){html+='</div>';gridOpen=false;}html+=`<div class="sec-label">${sec}</div>`;lastSec=sec;}
    if(isWide){
      if(gridOpen){html+='</div>';gridOpen=false;}
      html+=`<div class="w-wide" data-widget data-wi="${i}"><span class="w-arrow">›</span><div class="w-title">${label}</div><div id="wnum_${i}">${numHtml}</div></div>`;
    }else{
      if(!gridOpen){html+='<div class="wgrid">';gridOpen=true;}
      html+=`<div class="w" data-widget data-wi="${i}"><span class="w-arrow">›</span><div class="w-title">${label}</div><div id="wnum_${i}">${numHtml}</div></div>`;
    }
  });
  if(gridOpen)html+='</div>';
  html+=`<div style="padding:0 .75rem;margin-top:.5rem"><button class="btn btn-secondary" id="home-signout" style="font-size:12px">Sign out</button></div>`;
  document.getElementById('home-content').innerHTML=html;
  document.getElementById('home-signout').addEventListener('click',doLogout);
}
function setWidgetNum(i,n){
  const el=document.getElementById('wnum_'+i);if(!el)return;
  const[,,,w,d]=WIDGETS[i];
  el.innerHTML=`<div class="w-num ${numColor(n,w,d)}">${n}</div>`;
}
function updateCacheLabel(){
  const ts=Object.values(CACHE).map(c=>c.ts);
  if(!ts.length){document.getElementById('cache-label').textContent='';return;}
  const ago=Math.round((Date.now()-Math.min(...ts))/60000);
  document.getElementById('cache-label').textContent=ago<1?'just loaded':`cached ${ago}m ago`;
}
async function loadHome(){
  showView('home');setActiveNav('home');
  buildHomeShell();
  const allCached=WIDGETS.every(([,a,v])=>cGet(a+'_'+v)!==null);
  if(allCached){updateCacheLabel();return;}
  let rateLimited=false;
  for(let i=0;i<WIDGETS.length;i++){
    const[,appId,viewId,w,d]=WIDGETS[i];
    const cached=cGet(appId+'_'+viewId);
    if(cached!==null){setWidgetNum(i,cached);continue;}
    if(rateLimited){setWidgetNum(i,'—');continue;}
    try{
      const{n}=await fetchCount(appId,viewId);
      setWidgetNum(i,n);
    }catch(e){
      if(e.rateLimit){
        rateLimited=true;
        setWidgetNum(i,'—');
        const warn=document.createElement('div');
        warn.className='rate-msg';
        warn.textContent='⚠️ Podio rate limit reached. Wait ~1 hour then tap Refresh.';
        document.getElementById('home-content').prepend(warn);
      }else{setWidgetNum(i,'—');}
    }
    await delay(350);
  }
  updateCacheLabel();
}

// ── WIDGET CLICK → PROJECT LIST ──────────────────────────
async function openWidgetList(wi){
  const[label,appId,viewId]=WIDGETS[wi];
  WLIST_LABEL=label;
  document.getElementById('wl-title').textContent=label;
  document.getElementById('wl-count').textContent='';
  document.getElementById('wl-list').innerHTML='';
  document.getElementById('wl-loading').style.display='block';
  showView('wlist');setActiveNav('home');
  try{
    const raw=await fetchAllItems(appId,viewId);
    WLIST_ITEMS=raw.map(parseItem);
    document.getElementById('wl-count').textContent=WLIST_ITEMS.length+' project'+(WLIST_ITEMS.length!==1?'s':'');
    document.getElementById('wl-list').innerHTML=WLIST_ITEMS.length
      ?WLIST_ITEMS.map(item=>cardHTML(item)).join('')
      :'<div class="empty">No projects in this view.</div>';
  }catch(e){
    document.getElementById('wl-list').innerHTML=`<div class="empty">${e.message}</div>`;
  }
  document.getElementById('wl-loading').style.display='none';
}

// ── PROJECTS TAB ─────────────────────────────────────────
async function loadProjects(){
  showView('projects');setActiveNav('projects');
  document.getElementById('cards-loading').style.display='block';
  document.getElementById('cards-list').innerHTML='';
  document.getElementById('progress-bar').style.width='5%';
  try{
    let all=[],offset=0,total=null;
    while(true){
      document.getElementById('loading-msg').textContent=`Loading... (${all.length}${total?' of '+total:''})`;
      if(total)document.getElementById('progress-bar').style.width=Math.min(90,Math.round(all.length/total*100))+'%';
      const d=await podioPost(`https://api.podio.com/item/app/${PODIO.appId}/filter/${PODIO.viewId}/`,{limit:100,offset,sort_by:'last_edit_on',sort_desc:true});
      if(d.filtered!==undefined&&total===null)total=d.filtered;
      else if(d.total!==undefined&&total===null)total=d.total;
      all=all.concat(d.items||[]);
      if((d.items||[]).length<100||(total!==null&&all.length>=total))break;
      offset+=100;
    }
    document.getElementById('progress-bar').style.width='100%';
    ALL_ITEMS=all.map(parseItem);
    renderProjStats();renderChips();renderCards();
  }catch(e){
    document.getElementById('cards-list').innerHTML=`<div class="empty">${e.message}</div>`;
  }
  document.getElementById('cards-loading').style.display='none';
}
function renderProjStats(){
  const overdue=ALL_ITEMS.filter(i=>i.daysSince!==null&&i.daysSince>7).length;
  const active=ALL_ITEMS.filter(i=>(i.status||'').toLowerCase().includes('active')).length;
  document.getElementById('proj-stats').innerHTML=`
    <div style="background:var(--bg);border-radius:var(--radius);padding:.75rem;text-align:center;border:.5px solid var(--border)"><div style="font-size:24px;font-weight:700;color:var(--text)">${ALL_ITEMS.length}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Total</div></div>
    <div style="background:var(--bg);border-radius:var(--radius);padding:.75rem;text-align:center;border:.5px solid var(--border)"><div style="font-size:24px;font-weight:700;color:var(--blue)">${active}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Active</div></div>
    <div style="background:var(--bg);border-radius:var(--radius);padding:.75rem;text-align:center;border:.5px solid var(--border)"><div style="font-size:24px;font-weight:700;color:var(--amber-dark)">${overdue}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Review &gt;7d</div></div>`;
}
const MS_COLORS={'Packet Approval':'#7F77DD','Site Survey':'#BA7517','Design':'#D4537E','Scope of Work':'#185FA5','NTP':'#185FA5','Utility':'#1D9E75','Permit':'#BA7517','Install Ready':'#185FA5','Install':'#185FA5','Inspection':'#534AB7','PTO':'#0F6E56','Complete':'#3B6D11','On Hold':'#A32D2D','Cancelled':'#A32D2D'};
function chipColor(ms){const k=Object.keys(MS_COLORS).find(k=>ms&&ms.toLowerCase().includes(k.toLowerCase()));return k?MS_COLORS[k]:'#888780';}
function renderChips(){
  const statuses=['All',...new Set(ALL_ITEMS.map(i=>i.milestone).filter(Boolean))];
  document.getElementById('filter-chips').innerHTML=statuses.slice(0,14).map(s=>{
    const act=s===FILTER;const col=act?chipColor(s):'';
    return`<button class="chip${act?' active':''}" data-chip="${s.replace(/"/g,'&quot;')}" style="${act?`background:${col};border-color:${col};`:''}">${s}</button>`;
  }).join('');
}
function renderCards(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  let items=ALL_ITEMS;
  if(FILTER!=='All')items=items.filter(i=>i.milestone===FILTER);
  if(q)items=items.filter(i=>[i.name,i.address,i.milestone,i.status,i.notes,i.num].join(' ').toLowerCase().includes(q));
  document.getElementById('cards-list').innerHTML=items.length
    ?items.map(item=>cardHTML(item)).join('')
    :'<div class="empty">No projects match.</div>';
}

// ── ITEM PARSING ─────────────────────────────────────────
function fv(raw,fid){
  const f=(raw.fields||[]).find(f=>f.field_id===fid);
  if(!f||!f.values||!f.values.length)return '';
  const v=f.values[0];
  if(v.value&&v.value.text)return v.value.text;
  if(v.start_date)return v.start_date;
  if(v.start)return v.start.split(' ')[0];
  if(v.value!==undefined){if(typeof v.value==='object'&&v.value!==null)return v.value.text||v.value.name||'';return String(v.value);}
  return v.text||'';
}
function fnum(raw,fid){
  const f=(raw.fields||[]).find(f=>f.field_id===fid);
  if(!f||!f.values||!f.values.length)return null;
  const v=f.values[0];if(v.value!==undefined)return Math.round(parseFloat(v.value));return null;
}
function parseTitle(t){
  const m=(t||'').match(/^(#\S+)\s+(.+?)\s+-\s+(.+)$/);
  return m?{num:m[1],name:m[2],address:m[3]}:{num:'',name:t||'',address:''};
}
function stripHtml(h){return(h||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();}
function parseItem(raw){
  const{num,name,address}=parseTitle(raw.title);
  return{id:raw.item_id,num,name,address,title:raw.title||'',
    status:fv(raw,FIELD.status),milestone:fv(raw,FIELD.milestone),
    lastReview:fv(raw,FIELD.lastReview),notes:stripHtml(fv(raw,FIELD.notes)),
    funding:fv(raw,FIELD.funding),lender:fv(raw,FIELD.lender),
    finance:fv(raw,FIELD.finance),daysSince:fnum(raw,FIELD.daysSince),
    comments:fv(raw,FIELD.comments),workOrders:fv(raw,FIELD.workOrders),
    repTickets:fv(raw,FIELD.tickets),raw};
}
function msClass(ms){
  if(!ms)return 'ms-default';const s=ms.toLowerCase();
  if(s.includes('packet'))return 'ms-packet';
  if(s.includes('survey'))return 'ms-survey';
  if(s.includes('design'))return 'ms-design';
  if(s==='ntp')return 'ms-ntp';
  if(s.includes('scope'))return 'ms-scope';
  if(s.includes('utility'))return 'ms-utility';
  if(s.includes('permit'))return 'ms-permit';
  if(s.includes('install ready'))return 'ms-install';
  if(s.includes('install'))return 'ms-install';
  if(s.includes('inspect'))return 'ms-inspect';
  if(s.includes('pto'))return 'ms-pto';
  if(s.includes('complet')||s.includes('done'))return 'ms-complete';
  if(s.includes('hold'))return 'ms-hold';
  if(s.includes('cancel'))return 'ms-cancel';
  if(s.includes('hoa'))return 'ms-survey';
  return 'ms-default';
}

// ── CARD HTML ────────────────────────────────────────────
function cardHTML(item){
  const warn=item.daysSince!==null&&item.daysSince>7;
  return`<div class="card" data-itemid="${item.id}">
    <div class="card-id">${x(item.num)}</div>
    <div class="card-top"><div class="card-name">${x(item.name)}</div><span class="badge ${msClass(item.milestone)}">${x(item.milestone)||x(item.status)||'—'}</span></div>
    ${item.address?`<div class="card-addr">${x(item.address)}</div>`:''}
    <div class="card-meta">
      ${item.lastReview?`<span class="meta${warn?' warn':''}"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${x(item.lastReview)}${item.daysSince!==null?' · '+item.daysSince+'d ago':''}</span>`:''}
      ${item.lender?`<span class="meta"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>${x(item.lender)}</span>`:''}
    </div>
    ${item.notes?`<div class="card-note">${x(item.notes.substring(0,140))}${item.notes.length>140?'...':''}</div>`:''}
  </div>`;
}

// ── DETAIL VIEW ──────────────────────────────────────────
function openDetail(itemId){
  const item=ALL_ITEMS.find(i=>i.id===itemId)||WLIST_ITEMS.find(i=>i.id===itemId);
  if(!item)return;
  const labels={home:'Dashboard',projects:'My Projects',wlist:WLIST_LABEL};
  document.getElementById('detail-back-label').textContent=labels[PREV_VIEW]||'Back';
  buildDetail(item);
  showView('detail');
  setActiveNav(PREV_VIEW==='projects'?'projects':'home');
}
function parseBlocks(raw,sep){if(!raw)return[];return raw.split(sep).map(b=>b.trim()).filter(Boolean);}
function buildDetail(item){
  const rows=[
    ['Project status',item.status],['Milestone',item.milestone],
    ['Lender',item.lender],['Finance type',item.finance],
    ['Funding status',item.funding],['Last review',item.lastReview],
    ['Days since review',item.daysSince!==null?item.daysSince+' days':'']
  ].filter(r=>r[1]);

  const cBlocks=parseBlocks(item.comments,/\*{3}/);
  const cHtml=cBlocks.length?cBlocks.map(b=>{
    const lines=b.split('\n').map(l=>l.trim()).filter(Boolean);
    const m=lines[0]&&lines[0].match(/^(\d{4}-\d{2}-\d{2})\s+\d{2}:\d{2}:\d{2}\s+(.+)/);
    const body=lines.slice(m?1:0).join(' ');
    return`<div class="te"><div class="te-date">${x(m?m[1]:'')}${m?' · '+x(m[2]):''}</div><div class="te-body">${x(body.substring(0,300))}${body.length>300?'...':''}</div></div>`;
  }).join(''):'<div class="te"><div class="te-body" style="color:var(--text3)">No comments.</div></div>';

  const wBlocks=parseBlocks(item.workOrders,/\\---|\n---\n/).filter(b=>b.includes('WO-')||b.includes('Type:'));
  const wHtml=wBlocks.length?wBlocks.map(b=>{
    const status=(b.match(/Status:\*?\*?\s*([^\n<*]+)/i)||[])[1]||'';
    const type=(b.match(/Type:\*?\*?\s*([^\n<*]+)/i)||[])[1]||'';
    const appt=(b.match(/Appointment:\*?\*?\s*([^\n<*]+)/i)||[])[1]||'';
    const desc=(b.match(/Description:\*?\*?\s*([^\n<*]+)/i)||[])[1]||'';
    const woId=(b.match(/\[WO-(\d+)\]/)||[])[1]||'';
    return`<div class="te"><div class="te-date">${woId?'WO-'+woId:''}${appt?' · '+x(appt.trim()):''}</div>${type?`<div style="font-weight:600;font-size:12px;color:var(--text)">${x(type.trim())}</div>`:''} ${desc?`<div class="te-body">${x(desc.trim().substring(0,200))}</div>`:''} ${status?`<span class="te-status ${status.toLowerCase().includes('complet')?'ts-complete':'ts-open'}">${x(status.trim())}</span>`:''}</div>`;
  }).join(''):'<div class="te"><div class="te-body" style="color:var(--text3)">No work orders.</div></div>';

  const tBlocks=parseBlocks(item.repTickets,/\\---|\n---\n/).filter(b=>b.includes('Ticket')||b.includes('Status:'));
  const tHtml=tBlocks.length?tBlocks.map(b=>{
    const status=(b.match(/Status:\*?\*?\s*([^\n<*\[]+)/i)||[])[1]||'';
    const desc=(b.match(/Description:\*?\*?\s*([^\n]+)/i)||[])[1]||'';
    const date=(b.match(/^(\d{2}\/\d{2}\/\d{4})/)||[])[1]||'';
    const tid=(b.match(/Ticket #(\d+)/i)||[])[1]||'';
    const cls=status.toLowerCase().includes('complet')?'ts-complete':status.toLowerCase().includes('assign')?'ts-assigned':'ts-open';
    return`<div class="te"><div class="te-date">${date?x(date):''}${tid?' · Ticket #'+tid:''}</div>${desc?`<div class="te-body">${x(desc.trim().substring(0,200))}</div>`:''} ${status?`<span class="te-status ${cls}">${x(status.trim())}</span>`:''}</div>`;
  }).join(''):'<div class="te"><div class="te-body" style="color:var(--text3)">No tickets.</div></div>';

  document.getElementById('detail-body').innerHTML=`
    <div class="detail-hdr">
      <div class="detail-id">${x(item.num)}</div>
      <div class="detail-name">${x(item.name)}</div>
      ${item.address?`<div class="detail-addr">${x(item.address)}</div>`:''}
      <span class="badge ${msClass(item.milestone)}">${x(item.milestone)||x(item.status)||'—'}</span>
    </div>
    <div class="collapsible open">
      <div class="coll-hdr"><span class="coll-title">Project details</span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="coll-body">${rows.map(([k,v])=>`<div class="drow"><span class="dk">${x(k)}</span><span class="dv">${x(String(v))}</span></div>`).join('')}</div>
    </div>
    ${item.notes?`<div class="collapsible open"><div class="coll-hdr"><span class="coll-title">Project notes</span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="coll-body"><div class="notes-body">${x(item.notes)}</div></div></div>`:''}
    <div class="collapsible">
      <div class="coll-hdr"><span class="coll-title">Comments <span class="cnt">${cBlocks.length}</span></span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="coll-body">${cHtml}</div>
    </div>
    <div class="collapsible">
      <div class="coll-hdr"><span class="coll-title">Work orders <span class="cnt">${wBlocks.length}</span></span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="coll-body">${wHtml}</div>
    </div>
    <div class="collapsible">
      <div class="coll-hdr"><span class="coll-title">Support tickets <span class="cnt">${tBlocks.length}</span></span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="coll-body">${tHtml}</div>
    </div>
    <div style="padding:0 .75rem;margin-top:.5rem">
      <a href="https://podio.com/aveyo/projects/apps/project/items/${item.id}" target="_blank">
        <button class="btn btn-outline" style="font-size:12px">Open in Podio</button>
      </a>
    </div>`;
}

function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── INIT ─────────────────────────────────────────────────
TOKEN=loadToken();
document.getElementById('auth-user').value=PODIO.user;
document.getElementById('auth-pass').value=PODIO.pass;
if(TOKEN){
  document.getElementById('bnav').style.display='flex';
  setActiveNav('home');loadHome();
}else{
  showView('auth');
}
