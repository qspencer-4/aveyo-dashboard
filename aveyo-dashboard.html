<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Aveyo" />
<meta name="theme-color" content="#185FA5" />
<title>Aveyo Solar Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #185FA5; --blue-light: #E6F1FB; --blue-dark: #0C447C;
    --green-light: #EAF3DE; --green-dark: #27500A;
    --amber-light: #FAEEDA; --amber-dark: #633806;
    --red-light: #FCEBEB; --red-dark: #791F1F;
    --gray-light: #F1EFE8; --gray-dark: #444441;
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #262624; --bg3: #2e2e2b;
      --text: #f0efea; --text2: #a8a79f; --text3: #6e6d67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --blue-light: #0c3d6b; --blue-dark: #90c4f0;
      --green-light: #1a3a0a; --green-dark: #a8d870;
      --amber-light: #3d2a05; --amber-dark: #f5c060;
      --red-light: #3d1010; --red-dark: #f09090;
      --gray-light: #2e2e2b; --gray-dark: #c8c7bf;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  #app { max-width: 480px; margin: 0 auto; background: var(--bg3); min-height: 100vh; padding-bottom: 2rem; }
  .header { background: var(--blue); color: white; padding: 1rem 1rem 0.875rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .header-logo { width: 34px; height: 34px; background: rgba(255,255,255,0.2); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-logo svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 12px; opacity: 0.75; margin-top: 1px; }
  .header-right { margin-left: auto; display: flex; gap: 6px; }
  .header-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 12px; padding: 5px 10px; border-radius: var(--radius); cursor: pointer; font-family: inherit; }
  .section { background: var(--bg); border-radius: var(--radius-lg); margin: 0.75rem; padding: 1.25rem; border: 0.5px solid var(--border); }
  .section-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 0.875rem; }
  .field { margin-bottom: 0.875rem; }
  .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .field input { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); outline: none; font-family: inherit; }
  .field input:focus { border-color: var(--blue); }
  .btn { width: 100%; padding: 11px; border-radius: var(--radius); border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-secondary { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border2); margin-top: 8px; }
  .msg { font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; }
  .msg-error { color: #c0392b; } .msg-success { color: #27ae60; } .msg-info { color: var(--text2); }
  .search-wrap { margin: 0.75rem; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 10px 14px; }
  .search-box svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 2; flex-shrink: 0; }
  .search-box input { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--text); outline: none; font-family: inherit; }
  .search-box input::placeholder { color: var(--text3); }
  .stats-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin: 0 0.75rem 0.75rem; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: 0.75rem; text-align: center; border: 0.5px solid var(--border); }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .chips { display: flex; gap: 6px; overflow-x: auto; padding: 0 0.75rem 0.75rem; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; }
  .chip.active { background: var(--blue); color: white; border-color: var(--blue); }
  .cards { padding: 0 0.75rem; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.125rem; margin-bottom: 0.625rem; cursor: pointer; }
  .card:active { border-color: var(--blue); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .badge-blue { background: var(--blue-light); color: var(--blue-dark); }
  .badge-green { background: var(--green-light); color: var(--green-dark); }
  .badge-amber { background: var(--amber-light); color: var(--amber-dark); }
  .badge-red { background: var(--red-light); color: var(--red-dark); }
  .badge-gray { background: var(--gray-light); color: var(--gray-dark); }
  .card-addr { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .card-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .meta { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
  .meta svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }
  .card-note { font-size: 11px; color: var(--amber-dark); background: var(--amber-light); border-radius: var(--radius); padding: 4px 8px; margin-top: 7px; }
  .detail-back { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--blue); cursor: pointer; margin: 0.75rem; font-weight: 500; }
  .detail-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }
  .detail-header { margin: 0 0.75rem 0.75rem; }
  .detail-name { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .detail-section { background: var(--bg); border-radius: var(--radius-lg); margin: 0 0.75rem 0.625rem; border: 0.5px solid var(--border); overflow: hidden; }
  .detail-section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 0.75rem 1rem 0.5rem; border-bottom: 0.5px solid var(--border); }
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 1rem; border-bottom: 0.5px solid var(--border); font-size: 13px; gap: 12px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--text2); flex-shrink: 0; }
  .detail-val { color: var(--text); text-align: right; word-break: break-word; max-width: 65%; }
  .loading { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 0.875rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 2rem 1rem; color: var(--text3); font-size: 14px; line-height: 1.6; }
  .progress-wrap { width: 200px; margin: 10px auto 0; background: rgba(0,0,0,0.1); border-radius: 99px; height: 4px; overflow: hidden; }
  .progress-bar { height: 4px; background: var(--blue); border-radius: 99px; transition: width 0.3s; }
  .view { display: none; }
  .view.active { display: block; }
  .info-banner { border-radius: var(--radius); margin: 0.75rem; padding: 10px 14px; font-size: 12px; line-height: 1.5; }
  .info-green { background: var(--green-light); color: var(--green-dark); border: 0.5px solid rgba(59,109,17,0.2); }
  .info-amber { background: var(--amber-light); color: var(--amber-dark); border: 0.5px solid rgba(186,117,23,0.2); }
  .result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; gap: 8px; }
  .result-row:last-child { border-bottom: none; }
  .result-key { color: var(--text2); }
  .result-val { color: var(--text); font-weight: 500; text-align: right; }
  .result-val.success { color: var(--green-dark); }
  .result-val.fail { color: #c0392b; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <div style="flex:1;min-width:0;">
      <div class="header-title">Aveyo Solar</div>
      <div class="header-sub" id="header-sub">Project dashboard</div>
    </div>
    <div class="header-right">
      <button class="header-btn" id="btn-refresh" onclick="loadAllProjects()" style="display:none;">Refresh</button>
      <button class="header-btn" id="btn-logout" onclick="logout()" style="display:none;">Sign out</button>
    </div>
  </div>

  <!-- AUTH -->
  <div id="view-auth" class="view active">
    <div class="section" style="margin-top:0.75rem;">
      <div class="section-title">Sign in to Podio</div>
      <div class="field"><label>Username</label><input type="email" id="auth-user" autocomplete="email" /></div>
      <div class="field"><label>Password</label><input type="password" id="auth-pass" autocomplete="current-password" /></div>
      <div class="field"><label>App ID</label><input type="text" id="auth-appid" inputmode="numeric" /></div>
      <button class="btn btn-primary" id="btn-connect" onclick="connectPodio()">Sign in</button>
      <div class="msg msg-info" id="auth-msg"></div>
    </div>
  </div>

  <!-- DIAGNOSTIC VIEW -->
  <div id="view-diag" class="view">
    <div class="section" style="margin-top:0.75rem;">
      <div class="section-title">Running diagnostics...</div>
      <div id="diag-rows"></div>
      <div class="msg msg-info" id="diag-msg" style="text-align:left;margin-top:0.75rem;"></div>
      <button class="btn btn-secondary" style="margin-top:1rem;" onclick="logout()">Sign out</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="view">
    <div class="info-banner info-green" style="margin-top:0.75rem;" id="dash-info">Projects managed by Quentin Spencer</div>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search your projects..." oninput="renderCards()" />
      </div>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="chips" id="filter-chips"></div>
    <div class="cards">
      <div class="loading" id="cards-loading" style="display:none;">
        <div class="spinner"></div>
        <div id="loading-msg">Loading your projects...</div>
        <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:5%;"></div></div>
      </div>
      <div id="cards-list"></div>
    </div>
    <div style="padding:0 0.75rem;margin-top:0.5rem;">
      <button class="btn btn-secondary" style="font-size:12px;" onclick="runDiagnostics()">Run diagnostics</button>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="view-detail" class="view">
    <div class="detail-back" onclick="showView('dashboard')">
      <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
      Back to dashboard
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<script>
const DEFAULTS = {
  user: 'q.spencer@aveyo.com',
  pass: 'Clippers332!',
  cid: 'google-sheets-sync-kqxsb2',
  csec: 'WSRPgu0EuzhzTpvkVzfygSnmSZRmqnfYH8rfQJY4dHbDG7DFdgQ1mldX2nV3cAKo',
  appId: '29839792'
};

// Quentin Spencer's confirmed identifiers
const QUENTIN = {
  userId: 76946137,
  pmItemId: 6        // Item ID 6 in the Project Managers app
};

let S = {
  token: null, appId: DEFAULTS.appId,
  pmField: null,     // external_id of the PM field in the projects app
  pmFilterId: null,  // ID to filter by (item ID 6)
  items: [], filter: 'All'
};

function persist() {
  try { localStorage.setItem('aveyo_v10', JSON.stringify({ token: S.token, appId: S.appId, pmField: S.pmField, pmFilterId: S.pmFilterId })); } catch(e) {}
}
function loadPersist() {
  try {
    const d = JSON.parse(localStorage.getItem('aveyo_v10') || '{}');
    if (d.token) S.token = d.token;
    if (d.appId) S.appId = d.appId;
    if (d.pmField) S.pmField = d.pmField;
    if (d.pmFilterId) S.pmFilterId = d.pmFilterId;
  } catch(e) {}
}
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('btn-logout').style.display = v !== 'auth' ? 'block' : 'none';
  document.getElementById('btn-refresh').style.display = v === 'dashboard' ? 'block' : 'none';
  document.getElementById('header-sub').textContent = v === 'diag' ? 'Diagnostics' : v === 'dashboard' ? 'My projects' : 'Sign in';
}
function logout() {
  S = { token: null, appId: DEFAULTS.appId, pmField: null, pmFilterId: null, items: [], filter: 'All' };
  try { localStorage.removeItem('aveyo_v10'); } catch(e) {}
  document.getElementById('auth-user').value = DEFAULTS.user;
  document.getElementById('auth-pass').value = DEFAULTS.pass;
  document.getElementById('auth-appid').value = DEFAULTS.appId;
  showView('auth');
}

function addDiagRow(label, value, status) {
  const container = document.getElementById('diag-rows');
  const row = document.createElement('div');
  row.className = 'result-row';
  row.innerHTML = `<span class="result-key">${esc(label)}</span><span class="result-val ${status || ''}">${esc(String(value))}</span>`;
  container.appendChild(row);
}

async function connectPodio() {
  const user = document.getElementById('auth-user').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const appId = document.getElementById('auth-appid').value.trim();
  const msg = document.getElementById('auth-msg');
  const btn = document.getElementById('btn-connect');
  msg.className = 'msg msg-info'; msg.textContent = 'Signing in...'; btn.disabled = true;
  try {
    const res = await fetch('https://podio.com/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ grant_type: 'password', username: user, password: pass, client_id: DEFAULTS.cid, client_secret: DEFAULTS.csec })
    });
    const data = await res.json();
    if (!data.access_token) throw new Error(data.error_description || 'Sign in failed');
    S.token = data.access_token; S.appId = appId;
    persist();
    await runDiagnostics();
  } catch(e) {
    msg.className = 'msg msg-error'; msg.textContent = e.message;
    btn.disabled = false;
  }
}

async function runDiagnostics() {
  showView('diag');
  document.getElementById('diag-rows').innerHTML = '';
  document.getElementById('diag-msg').textContent = 'Running...';

  addDiagRow('App ID', S.appId, '');
  addDiagRow('Quentin user ID', QUENTIN.userId, '');
  addDiagRow('Quentin PM item ID', QUENTIN.pmItemId, '');

  // Step 1: Auto-detect the PM field by scanning app fields
  let pmField = S.pmField;
  try {
    const res = await fetch(`https://api.podio.com/app/${S.appId}`, { headers: { Authorization: 'OAuth2 ' + S.token } });
    const data = await res.json();
    const fields = data.fields || [];
    // Look for an app-reference field that likely references the PM app
    const appFields = fields.filter(f => f.type === 'app' || f.type === 'contact' || f.type === 'member');
    addDiagRow('App-type fields found', appFields.map(f => f.label).join(', ') || 'none', appFields.length ? 'success' : 'fail');

    // Try to auto-pick the PM field
    if (!pmField) {
      const pmCandidate = appFields.find(f =>
        f.label.toLowerCase().includes('project manager') ||
        f.label.toLowerCase().includes('pm') ||
        f.external_id.toLowerCase().includes('project-manager') ||
        f.external_id.toLowerCase().includes('project_manager')
      ) || appFields[0];
      if (pmCandidate) {
        pmField = pmCandidate.external_id;
        addDiagRow('Auto-detected PM field', `${pmCandidate.label} (${pmField})`, 'success');
      } else {
        addDiagRow('PM field auto-detect', 'Not found', 'fail');
      }
    } else {
      addDiagRow('PM field (saved)', pmField, 'success');
    }
  } catch(e) {
    addDiagRow('App field fetch', 'Failed: ' + e.message, 'fail');
  }

  if (!pmField) {
    document.getElementById('diag-msg').textContent = 'Could not find PM field. Check your App ID.';
    return;
  }

  // Step 2: Try all candidate filter IDs including item ID 6
  const candidates = [
    { id: QUENTIN.pmItemId, label: 'PM item ID 6' },
    { id: QUENTIN.userId, label: 'User ID 76946137' }
  ];

  let workingField = null;
  let workingId = null;
  let workingCount = 0;

  for (const candidate of candidates) {
    try {
      document.getElementById('diag-msg').textContent = `Testing filter: ${candidate.label}...`;
      const res = await fetch(`https://api.podio.com/item/app/${S.appId}/filter/`, {
        method: 'POST',
        headers: { Authorization: 'OAuth2 ' + S.token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ filters: { [pmField]: [candidate.id] }, limit: 1, offset: 0 })
      });
      const data = await res.json();
      const count = data.total || (data.items || []).length;
      addDiagRow(`Filter by ${candidate.label}`, count + ' projects found', count > 0 ? 'success' : 'fail');
      if (count > 0 && !workingId) {
        workingField = pmField;
        workingId = candidate.id;
        workingCount = count;
      }
    } catch(e) {
      addDiagRow(`Filter by ${candidate.label}`, 'Error: ' + e.message, 'fail');
    }
  }

  // Step 3: If nothing worked, try all app-type fields with item ID 6
  if (!workingId) {
    try {
      const res = await fetch(`https://api.podio.com/app/${S.appId}`, { headers: { Authorization: 'OAuth2 ' + S.token } });
      const data = await res.json();
      const allFields = (data.fields || []).filter(f => f.type === 'app' || f.type === 'contact' || f.type === 'member');
      for (const f of allFields) {
        for (const cid of [QUENTIN.pmItemId, QUENTIN.userId]) {
          try {
            const r2 = await fetch(`https://api.podio.com/item/app/${S.appId}/filter/`, {
              method: 'POST',
              headers: { Authorization: 'OAuth2 ' + S.token, 'Content-Type': 'application/json' },
              body: JSON.stringify({ filters: { [f.external_id]: [cid] }, limit: 1, offset: 0 })
            });
            const d2 = await r2.json();
            const count = d2.total || (d2.items || []).length;
            if (count > 0) {
              workingField = f.external_id;
              workingId = cid;
              workingCount = count;
              addDiagRow(`Found match!`, `Field "${f.label}" + ID ${cid} = ${count} projects`, 'success');
              break;
            }
          } catch(e) {}
        }
        if (workingId) break;
      }
    } catch(e) {}
  }

  if (workingField && workingId) {
    S.pmField = workingField;
    S.pmFilterId = workingId;
    persist();
    document.getElementById('diag-msg').textContent = `✓ Found ${workingCount} projects! Loading dashboard...`;
    setTimeout(() => loadAllProjects(), 1000);
  } else {
    document.getElementById('diag-msg').textContent = 'Could not find matching projects. See results above for clues.';
    addDiagRow('Result', 'No matching filter found', 'fail');
  }
}

async function loadAllProjects() {
  showView('dashboard');
  document.getElementById('cards-loading').style.display = 'block';
  document.getElementById('cards-list').innerHTML = '';
  document.getElementById('header-sub').textContent = 'Loading...';

  try {
    let all = [];
    let offset = 0;
    const limit = 100;
    let total = null;

    while (true) {
      const loaded = all.length;
      document.getElementById('loading-msg').textContent = `Loading projects... (${loaded}${total ? ' of ' + total : ''})`;
      if (total) document.getElementById('progress-bar').style.width = Math.min(95, Math.round((loaded / total) * 100)) + '%';

      const res = await fetch(`https://api.podio.com/item/app/${S.appId}/filter/`, {
        method: 'POST',
        headers: { Authorization: 'OAuth2 ' + S.token, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filters: { [S.pmField]: [S.pmFilterId] },
          limit, offset,
          sort_by: 'last_edit_on',
          sort_desc: true
        })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.total && !total) total = data.total;
      const batch = data.items || [];
      all = all.concat(batch);
      if (batch.length < limit || (total && all.length >= total)) break;
      offset += limit;
    }

    document.getElementById('progress-bar').style.width = '100%';
    S.items = all.map(parseItem);
    document.getElementById('header-sub').textContent = S.items.length + ' projects';
    document.getElementById('dash-info').textContent = `${S.items.length} projects — Quentin Spencer (PM)`;
    renderStats(); renderChips(); renderCards();
  } catch(e) {
    document.getElementById('cards-list').innerHTML = `<div class="empty">Error: ${esc(e.message)}<br><br><small>Try "Run diagnostics" below.</small></div>`;
  } finally {
    document.getElementById('cards-loading').style.display = 'none';
  }
}

function getVal(item, hints) {
  const f = (item.fields || []).find(f => hints.some(h => f.label.toLowerCase().includes(h) || f.external_id.toLowerCase().includes(h)));
  if (!f || !f.values || !f.values.length) return '';
  const v = f.values[0];
  if (v.value !== undefined) {
    if (typeof v.value === 'object' && v.value !== null) return v.value.text || v.value.name || (v.value.start ? v.value.start.split(' ')[0] : '') || v.value.title || '';
    return String(v.value);
  }
  return v.text || '';
}

function parseItem(raw) {
  return {
    id: raw.item_id,
    title: raw.title || getVal(raw, ['name','customer','client']) || ('Item #' + raw.item_id),
    address: getVal(raw, ['address','addr','location','street','city']),
    status: getVal(raw, ['status','stage','state','phase','step']),
    date: getVal(raw, ['install','milestone','date','schedule','completion']),
    notes: getVal(raw, ['note','flag','comment','remark','issue']),
    raw
  };
}

function badgeClass(s) {
  s = (s || '').toLowerCase();
  if (!s) return 'badge-gray';
  if (s.includes('complet') || s.includes('done') || s.includes('install') || s.includes('final')) return 'badge-green';
  if (s.includes('progress') || s.includes('active') || s.includes('schedul') || s.includes('approv')) return 'badge-blue';
  if (s.includes('pending') || s.includes('wait') || s.includes('review') || s.includes('hold')) return 'badge-amber';
  if (s.includes('cancel') || s.includes('reject') || s.includes('issue') || s.includes('fail')) return 'badge-red';
  return 'badge-gray';
}

function renderStats() {
  const items = S.items;
  const completed = items.filter(i => { const s=(i.status||'').toLowerCase(); return s.includes('complet')||s.includes('done')||s.includes('install'); }).length;
  const active = items.filter(i => { const s=(i.status||'').toLowerCase(); return s.includes('progress')||s.includes('active')||s.includes('schedul'); }).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-num">${items.length}</div><div class="stat-lbl">My projects</div></div>
    <div class="stat"><div class="stat-num" style="color:#185FA5">${active}</div><div class="stat-lbl">Active</div></div>
    <div class="stat"><div class="stat-num" style="color:#3B6D11">${completed}</div><div class="stat-lbl">Completed</div></div>
  `;
}

function renderChips() {
  const statuses = ['All', ...new Set(S.items.map(i => i.status).filter(Boolean))].slice(0, 10);
  document.getElementById('filter-chips').innerHTML = statuses.map(s =>
    `<button class="chip ${s === S.filter ? 'active' : ''}" onclick="setFilter(${JSON.stringify(s)})">${esc(s)}</button>`
  ).join('');
}

function setFilter(f) { S.filter = f; renderChips(); renderCards(); }

function renderCards() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  let items = S.items;
  if (S.filter !== 'All') items = items.filter(i => i.status === S.filter);
  if (q) items = items.filter(i => [i.title, i.address, i.status, i.notes].join(' ').toLowerCase().includes(q));
  if (!items.length) { document.getElementById('cards-list').innerHTML = '<div class="empty">No projects match your search.</div>'; return; }
  document.getElementById('cards-list').innerHTML = items.map(item => `
    <div class="card" onclick="showDetail(${item.id})">
      <div class="card-top"><div class="card-name">${esc(item.title)}</div><span class="badge ${badgeClass(item.status)}">${esc(item.status)||'—'}</span></div>
      ${item.address ? `<div class="card-addr">${esc(item.address)}</div>` : ''}
      <div class="card-meta">
        ${item.date ? `<span class="meta"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${esc(item.date)}</span>` : ''}
        <span class="meta"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>ID ${item.id}</span>
      </div>
      ${item.notes ? `<div class="card-note">${esc(item.notes.substring(0,120))}${item.notes.length>120?'...':''}</div>` : ''}
    </div>
  `).join('');
}

function showDetail(itemId) {
  const item = S.items.find(i => i.id === itemId);
  if (!item) return;
  const allFields = (item.raw.fields || []).map(f => {
    let val = '';
    if (f.values && f.values.length) {
      const v = f.values[0];
      if (v.value !== undefined) { val = (typeof v.value === 'object' && v.value) ? (v.value.text || v.value.name || (v.value.start ? v.value.start.split(' ')[0] : '') || v.value.title || '') : String(v.value); }
      else if (v.text) val = v.text;
    }
    return { label: f.label, val };
  }).filter(f => f.val);

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-header">
      <div class="detail-name">${esc(item.title)}</div>
      <span class="badge ${badgeClass(item.status)}">${esc(item.status)||'—'}</span>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Key details</div>
      ${item.address ? `<div class="detail-row"><span class="detail-key">Address</span><span class="detail-val">${esc(item.address)}</span></div>` : ''}
      ${item.date ? `<div class="detail-row"><span class="detail-key">Install / milestone</span><span class="detail-val">${esc(item.date)}</span></div>` : ''}
      ${item.notes ? `<div class="detail-row"><span class="detail-key">Notes</span><span class="detail-val">${esc(item.notes)}</span></div>` : ''}
      <div class="detail-row"><span class="detail-key">Podio ID</span><span class="detail-val">${item.id}</span></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">All fields</div>
      ${allFields.map(f => `<div class="detail-row"><span class="detail-key">${esc(f.label)}</span><span class="detail-val">${esc(f.val)}</span></div>`).join('')}
    </div>
  `;
  showView('detail');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadPersist();
document.getElementById('auth-user').value = DEFAULTS.user;
document.getElementById('auth-pass').value = DEFAULTS.pass;
document.getElementById('auth-appid').value = S.appId || DEFAULTS.appId;

if (S.token && S.pmField && S.pmFilterId) {
  loadAllProjects();
} else if (S.token) {
  runDiagnostics();
} else {
  showView('auth');
}
</script>
</body>
</html>
