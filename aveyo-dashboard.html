<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Aveyo"/>
<meta name="theme-color" content="#185FA5"/>
<title>Aveyo Solar v50</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;--green-light:#EAF3DE;--green-dark:#27500A;--amber-light:#FAEEDA;--amber-dark:#633806;--red-light:#FCEBEB;--red-dark:#791F1F;--purple-light:#EEEDFE;--purple-dark:#3C3489;--teal-light:#E1F5EE;--teal-dark:#085041;--pink-light:#FBEAF0;--pink-dark:#72243E;--gray-light:#F1EFE8;--gray-dark:#444441;--bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);--radius:8px;--radius-lg:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#262624;--bg3:#2e2e2b;--text:#f0efea;--text2:#a8a79f;--text3:#6e6d67;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--blue-light:#0c3d6b;--blue-dark:#90c4f0;--green-light:#1a3a0a;--green-dark:#a8d870;--amber-light:#3d2a05;--amber-dark:#f5c060;--red-light:#3d1010;--red-dark:#f09090;--purple-light:#26215C;--purple-dark:#AFA9EC;--teal-light:#04342C;--teal-dark:#5DCAA5;--pink-light:#4B1528;--pink-dark:#ED93B1;--gray-light:#2e2e2b;--gray-dark:#c8c7bf}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:5rem}
.hdr{background:var(--blue);color:#fff;padding:1rem 1rem .875rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.hdr-title{font-size:16px;font-weight:600}
.hdr-sub{font-size:12px;opacity:.75;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:12px;padding:5px 10px;border-radius:var(--radius);cursor:pointer;font-family:inherit}
.hdr-cache{font-size:10px;opacity:.65;white-space:nowrap}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:.5px solid var(--border2);display:flex;z-index:200}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 14px;cursor:pointer;border:none;background:transparent;font-family:inherit;gap:3px}
.bnav-btn svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.8}
.bnav-btn span{font-size:10px;color:var(--text3);font-weight:500}
.bnav-btn.active svg{stroke:var(--blue)}
.bnav-btn.active span{color:var(--blue)}
.section-card{background:var(--bg);border-radius:var(--radius-lg);margin:.75rem;padding:1.25rem;border:.5px solid var(--border)}
.field{margin-bottom:.875rem}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.field input{width:100%;padding:10px 12px;font-size:14px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit}
.field input:focus{border-color:var(--blue)}
.btn{width:100%;padding:11px;border-radius:var(--radius);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--bg2);color:var(--text);border:.5px solid var(--border2);margin-top:8px}
.btn-outline{background:transparent;color:var(--blue);border:.5px solid var(--blue);margin-top:8px}
.msg{font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.msg-error{color:#c0392b}.msg-success{color:#27ae60}.msg-info{color:var(--text2)}
.sec-label{font-size:13px;font-weight:700;color:var(--text);padding:1rem .75rem .5rem;letter-spacing:.01em}
.wgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:0 .75rem .5rem}
.w{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem;cursor:pointer;position:relative}
.w:active{border-color:var(--blue)}
.w-arrow{position:absolute;top:10px;right:10px;font-size:16px;color:var(--text3)}
.w-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;line-height:1.4;padding-right:18px}
.w-num{font-size:36px;font-weight:700;line-height:1}
.w-num.blue{color:var(--blue)}.w-num.green{color:#3B6D11}.w-num.amber{color:var(--amber-dark)}.w-num.red{color:#A32D2D}.w-num.def{color:var(--text)}
.w-spin{display:inline-block;width:22px;height:22px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-top:4px}
.w-wide{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);margin:0 .75rem .5rem;padding:1rem;cursor:pointer;position:relative}
.w-wide:active{border-color:var(--blue)}
.w-wide .w-title{margin-bottom:6px;padding-right:18px}
.search-wrap{margin:.75rem}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-lg);padding:10px 14px}
.search-box svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0}
.search-box input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);outline:none;font-family:inherit}
.search-box input::placeholder{color:var(--text3)}
.chips{display:flex;gap:6px;overflow-x:auto;padding:0 .75rem .75rem;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:99px;border:.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.active{color:#fff;border-color:transparent}
.cards{padding:0 .75rem}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.125rem;margin-bottom:.625rem;cursor:pointer}
.card:active{border-color:var(--blue)}
.card-id{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.04em;margin-bottom:2px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px}
.card-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.card-addr{font-size:12px;color:var(--text2);margin-bottom:5px}
.card-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}
.meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.meta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.meta.warn{color:var(--amber-dark);font-weight:500}
.card-note{font-size:11px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:6px 8px;margin-top:7px;line-height:1.5;border-left:2px solid var(--blue)}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0;font-weight:600}
.ms-packet{background:var(--purple-light);color:var(--purple-dark)}
.ms-survey{background:var(--amber-light);color:var(--amber-dark)}
.ms-design{background:var(--pink-light);color:var(--pink-dark)}
.ms-ntp,.ms-scope,.ms-install{background:var(--blue-light);color:var(--blue-dark)}
.ms-utility{background:var(--teal-light);color:var(--teal-dark)}
.ms-permit{background:var(--amber-light);color:var(--amber-dark)}
.ms-inspect{background:var(--purple-light);color:var(--purple-dark)}
.ms-pto{background:var(--teal-light);color:var(--teal-dark)}
.ms-complete{background:var(--green-light);color:var(--green-dark)}
.ms-hold,.ms-cancel{background:var(--red-light);color:var(--red-dark)}
.ms-default{background:var(--gray-light);color:var(--gray-dark)}
.collapsible{background:var(--bg);border-radius:var(--radius-lg);margin:0 .75rem .625rem;border:.5px solid var(--border);overflow:hidden}
.coll-hdr{display:flex;justify-content:space-between;align-items:center;padding:.875rem 1rem;cursor:pointer;user-select:none}
.coll-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.coll-title .cnt{background:var(--bg2);color:var(--text3);font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500}
.coll-arrow{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.collapsible.open .coll-arrow{transform:rotate(180deg)}
.coll-body{display:none;border-top:.5px solid var(--border)}
.collapsible.open .coll-body{display:block}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 1rem;border-bottom:.5px solid var(--border);font-size:13px;gap:12px}
.drow:last-child{border-bottom:none}
.dk{color:var(--text2);flex-shrink:0;max-width:45%}
.dv{color:var(--text);text-align:right;word-break:break-word;max-width:53%}
.te{padding:10px 1rem;border-bottom:.5px solid var(--border);font-size:12px;line-height:1.5}
.te:last-child{border-bottom:none}
.te-date{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.te-body{color:var(--text2);margin-top:2px}
.te-status{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;margin-top:4px;font-weight:500}
.ts-complete{background:var(--green-light);color:var(--green-dark)}
.ts-assigned{background:var(--amber-light);color:var(--amber-dark)}
.ts-open{background:var(--blue-light);color:var(--blue-dark)}
.notes-body{padding:.875rem 1rem;font-size:13px;line-height:1.6;color:var(--text2)}
.back-bar{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--blue);cursor:pointer;margin:.75rem;font-weight:500}
.back-bar svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.detail-hdr{margin:0 .75rem .75rem}
.swipe-nav{display:flex;align-items:center;justify-content:space-between;padding:.25rem .75rem;margin-bottom:.25rem}
.swipe-btn{background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius);padding:6px 14px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;font-family:inherit}
.swipe-btn:disabled{opacity:.3;cursor:not-allowed}
.swipe-pos{font-size:12px;color:var(--text3)}
.review-filter-chips{display:flex;gap:6px;overflow-x:auto;padding:.5rem .75rem;scrollbar-width:none;border-bottom:.5px solid var(--border)}
.review-filter-chips::-webkit-scrollbar{display:none}
.rchip{flex-shrink:0;font-size:11px;padding:4px 10px;border-radius:99px;border:.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap}
.rchip.active{background:var(--amber-dark);color:#fff;border-color:transparent}
.inline-compose{margin:.625rem .75rem 0;border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.inline-compose-hdr{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;cursor:pointer;background:var(--bg)}
.inline-compose-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.inline-compose-arrow{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;transition:transform .2s}
.inline-compose.open .inline-compose-arrow{transform:rotate(180deg)}
.inline-compose-body{display:none;border-top:.5px solid var(--border);padding:.875rem 1rem;background:var(--bg)}
.inline-compose.open .inline-compose-body{display:block}
.inline-textarea{width:100%;min-height:100px;padding:10px;font-size:13px;line-height:1.6;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit;resize:vertical}
.inline-textarea:focus{border-color:var(--blue)}
.inline-actions{display:flex;gap:8px;margin-top:8px}
.inline-gen-btn{flex:1;padding:8px;border-radius:var(--radius);border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--bg2);color:var(--text);border:.5px solid var(--border2)}
.inline-send-btn{flex:2;padding:8px;border-radius:var(--radius);border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--blue);color:#fff}
.inline-send-btn:disabled{opacity:.45}
.inline-status{font-size:11px;margin-top:6px;min-height:16px;color:var(--text3)}
.detail-id{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.04em;margin-bottom:3px}
.detail-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.detail-addr{font-size:13px;color:var(--text2);margin-bottom:8px}
.loading{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .875rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:14px;line-height:1.6}
.progress-wrap{width:200px;margin:10px auto 0;background:rgba(0,0,0,.1);border-radius:99px;height:4px;overflow:hidden}
.progress-bar{height:4px;background:var(--blue);border-radius:99px;transition:width .3s}
.rate-msg{background:var(--amber-light);color:var(--amber-dark);border-radius:var(--radius);padding:.75rem 1rem;margin:.75rem;font-size:12px;line-height:1.5;text-align:center}
.wl-header{background:var(--bg);border-bottom:.5px solid var(--border);padding:.875rem 1rem}
.wl-title{font-size:15px;font-weight:700;color:var(--text)}
.wl-count{font-size:12px;color:var(--text3);margin-top:2px}
.view{display:none}.view.active{display:block}
/* Compose sheet */
.compose-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:flex-end;justify-content:center}
.compose-overlay.open{display:flex}
.compose-overlay.minimized{background:transparent;pointer-events:none;align-items:flex-end}
.compose-overlay.minimized .compose-sheet{display:none}
.compose-mini{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);width:calc(100% - 1.5rem);max-width:460px;background:var(--blue);color:#fff;border-radius:var(--radius-lg);padding:.75rem 1rem;display:none;align-items:center;gap:10px;z-index:499;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.compose-mini.visible{display:flex}
.compose-mini-icon{font-size:16px;flex-shrink:0}
.compose-mini-text{flex:1;min-width:0}
.compose-mini-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.compose-mini-sub{font-size:11px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.compose-mini-expand{font-size:18px;opacity:.75;flex-shrink:0}
.compose-sheet{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:1.25rem;max-height:85vh;display:flex;flex-direction:column;gap:.875rem}
.compose-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto -.25rem}
.compose-title{font-size:15px;font-weight:700;color:var(--text)}
.compose-subtitle{font-size:12px;color:var(--text3);margin-top:2px}
.compose-type-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;margin-bottom:.25rem}
.compose-type-rep{background:var(--blue-light);color:var(--blue-dark)}
.compose-type-customer{background:var(--teal-light);color:var(--teal-dark)}
.compose-type-review{background:var(--purple-light);color:var(--purple-dark)}
.compose-loading{text-align:center;padding:1.5rem;color:var(--text2);font-size:13px}
.compose-loading .spinner{width:22px;height:22px;margin:0 auto .5rem}
.compose-textarea{width:100%;min-height:160px;max-height:280px;padding:12px;font-size:13px;line-height:1.6;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit;resize:vertical}
.compose-textarea:focus{border-color:var(--blue)}
.compose-chars{font-size:11px;color:var(--text3);text-align:right;margin-top:-6px}
.compose-toolbar{display:flex;gap:6px;margin-bottom:6px}
.bold-btn{background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--radius);padding:4px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text);line-height:1}
.bold-btn:active{background:var(--border2)}
.compose-actions{display:flex;gap:8px}
.compose-actions .btn{margin-top:0}
.btn-send{background:var(--blue);color:#fff;flex:2}
.btn-send:disabled{opacity:.45}
.btn-cancel-compose{background:var(--bg2);color:var(--text);border:.5px solid var(--border2);flex:1}
.compose-result{border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;font-weight:500;text-align:center}
.compose-result.success{background:var(--green-light);color:var(--green-dark)}
.compose-result.error{background:var(--red-light);color:var(--red-dark)}
.drow-edit{display:flex;justify-content:space-between;align-items:center;padding:9px 1rem;border-bottom:.5px solid var(--border);font-size:13px;gap:12px}
.drow-edit:last-child{border-bottom:none}
.date-edit-wrap{display:flex;align-items:center;gap:6px}
.date-input{border:.5px solid var(--border2);border-radius:var(--radius);padding:4px 8px;font-size:12px;color:var(--text);background:var(--bg2);font-family:inherit;outline:none}
.date-input:focus{border-color:var(--blue)}
.date-save-btn{font-size:11px;font-weight:600;color:#fff;background:var(--blue);border:none;border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-family:inherit}
.date-save-btn:disabled{opacity:.45}
.date-saved{font-size:11px;color:#3B6D11;font-weight:600}
.card-action-btn{flex:1;padding:8px;border-radius:var(--radius);border:.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.card-action-btn.rep{background:var(--blue-light);color:var(--blue-dark);border-color:transparent}
.card-action-btn.customer{background:var(--teal-light);color:var(--teal-dark);border-color:transparent}
.card-note{font-size:11px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:6px 8px;margin-top:7px;line-height:1.6;border-left:2px solid var(--blue)}
.card-note-more{color:var(--blue);font-weight:600;cursor:pointer}
.card-note-full{white-space:pre-wrap}
.card-ms-expand{margin-top:6px;border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-ms-row{display:flex;justify-content:space-between;padding:4px 8px;border-bottom:.5px solid var(--border);font-size:11px;gap:8px}
.card-ms-row:last-child{border-bottom:none}
.card-ms-key{color:var(--text2);flex-shrink:0;max-width:55%}
.card-ms-val{color:var(--text);text-align:right;font-weight:500;word-break:break-word}
.card-ms-val.done{color:#3B6D11}
.card-ms-val.progress{color:var(--amber-dark)}
.card-ms-toggle{font-size:11px;color:var(--blue);font-weight:600;cursor:pointer;margin-top:5px;display:inline-block}
.card-actions-row{display:flex;gap:6px;margin-top:.625rem}
.card-action-btn{flex:1;padding:8px;border-radius:var(--radius);border:.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.card-action-btn.rep{background:var(--blue-light);color:var(--blue-dark);border-color:transparent}
.card-action-btn.customer{background:var(--teal-light);color:var(--teal-dark);border-color:transparent}


/* ── SOW TAB ─────────────────────────────────────────── */
.sow-toolbar{display:flex;align-items:center;gap:8px;padding:.75rem;background:var(--bg);border-bottom:.5px solid var(--border);position:sticky;top:57px;z-index:50}
.sow-select{flex:1;padding:8px 12px;font-size:13px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit}
.sow-count{font-size:12px;color:var(--text3);white-space:nowrap}
.sow-split{display:flex;flex-direction:column}
.sow-list{border-bottom:.5px solid var(--border)}
.sow-detail{background:var(--bg3)}
.sow-checklist{background:var(--bg);border-radius:var(--radius-lg);margin:.75rem;border:.5px solid var(--border);overflow:hidden}
.sow-checklist-hdr{padding:.875rem 1rem;background:var(--blue);color:#fff;font-size:13px;font-weight:600}
.sow-check-row{display:flex;align-items:flex-start;gap:10px;padding:.875rem 1rem;border-bottom:.5px solid var(--border);cursor:pointer}
.sow-check-row:last-child{border-bottom:none}
.sow-check-row:active{background:var(--bg2)}
.sow-check-icon{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:12px;transition:all .15s}
.sow-check-icon.done{background:var(--green-light);border-color:#3B6D11;color:#3B6D11}
.sow-check-icon.warn{background:var(--amber-light);border-color:var(--amber-dark);color:var(--amber-dark)}
.sow-check-icon.empty{background:var(--bg2);border-color:var(--border2);color:var(--text3)}
.sow-check-content{flex:1;min-width:0}
.sow-check-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.sow-check-value{font-size:12px;color:var(--text2);line-height:1.4}
.sow-check-value.warn{color:var(--amber-dark);font-weight:500}
.sow-check-value.good{color:#3B6D11;font-weight:500}
.sow-distance-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;margin-top:3px}
.sow-production-box{margin:.75rem;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sow-production-hdr{padding:.875rem 1rem;background:var(--purple-light);color:var(--purple-dark);font-size:13px;font-weight:600}
.sow-production-body{padding:.875rem 1rem}
.sow-production-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--border);font-size:13px}
.sow-production-row:last-child{border-bottom:none}
.sow-production-label{color:var(--text2)}
.sow-production-val{font-weight:600;color:var(--text)}
.sow-co-btn{width:100%;margin-top:.875rem;padding:10px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:#A32D2D;color:#fff}
.sow-co-btn:disabled{opacity:.45}
.sow-co-result{margin-top:8px;font-size:12px;padding:8px 10px;border-radius:var(--radius);text-align:center}
.sow-co-result.success{background:var(--green-light);color:var(--green-dark)}
.sow-co-result.error{background:var(--red-light);color:var(--red-dark)}
.sow-production-input{width:100%;padding:8px 10px;font-size:13px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit;margin-top:6px}
.sow-production-input:focus{border-color:var(--blue)}
/* KB TAB */
.kb-search{margin:.75rem;display:flex;align-items:center;gap:8px;background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-lg);padding:10px 14px}
.kb-search svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0}
.kb-search input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);outline:none;font-family:inherit}
.kb-section{margin:.75rem}
.kb-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.kb-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:.5rem;overflow:hidden}
.kb-card-hdr{display:flex;justify-content:space-between;align-items:center;padding:.875rem 1rem;cursor:pointer}
.kb-card-title{font-size:13px;font-weight:600;color:var(--text)}
.kb-card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.kb-card-arrow{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.kb-card.open .kb-card-arrow{transform:rotate(180deg)}
.kb-card-body{display:none;border-top:.5px solid var(--border);padding:.875rem 1rem}
.kb-card.open .kb-card-body{display:block}
.kb-adder-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--border);font-size:12px}
.kb-adder-row:last-child{border-bottom:none}
.kb-adder-name{color:var(--text);flex:1}
.kb-adder-cost{color:var(--blue);font-weight:600;text-align:right;white-space:nowrap}
/* ── DESKTOP LAYOUT (768px+) ─────────────────────────── */
@media(min-width:768px){
  body{background:var(--bg3)}
  #app{max-width:100%;padding-bottom:0;display:block;min-height:100vh}

  .hdr{position:sticky;top:0;z-index:100;padding:1rem 1.5rem;max-width:100%}

  /* Keep bottom nav fixed on desktop too */
  .bnav{position:fixed;bottom:0;left:0;right:0;width:100%;max-width:100%;transform:none;flex-direction:row;height:56px;padding:0;border-top:.5px solid var(--border2);z-index:200}
  .bnav-btn{flex-direction:column;padding:8px 0 10px;gap:3px}
  .bnav-btn svg{width:22px;height:22px}
  .bnav-btn span{font-size:10px}

  /* Main content area - full width with bottom padding for nav */
  .view{grid-column:1/-1;max-width:960px;margin:0 auto;padding:0 1.5rem 5rem;width:100%}
  .view.active{display:block}

  /* Home widgets - 3 column grid on desktop */
  .wgrid{grid-template-columns:repeat(3,minmax(0,1fr));margin:0 0 .5rem}
  .sec-label{padding:1rem 0 .5rem}
  .w-wide{margin:0 0 .5rem}

  /* Cards - 2 column on desktop */
  .cards{padding:0;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.625rem}
  .card{margin-bottom:0}

  /* Search and filters */
  .search-wrap{margin:.75rem 0}
  .chips{padding:0 0 .75rem}

  /* Detail view */
  #view-detail .collapsible{margin:0 0 .625rem}
  #view-detail .detail-hdr{margin:0 0 .75rem}
  #view-detail .inline-compose{margin:.625rem 0 0}

  /* Widget list */
  #view-wlist .cards{padding-top:.75rem}
  .wl-header{padding:.875rem 0}

  /* Compose sheet - centered modal on desktop */
  .compose-overlay{align-items:center}
  .compose-sheet{border-radius:var(--radius-lg);max-width:540px;max-height:80vh}
  .compose-mini{max-width:500px}

  /* Proj stats */
  #proj-stats{margin:0 0 .75rem}

  /* Collapsibles in detail */
  .collapsible{margin:0 0 .625rem}

  /* Back bar */
  .back-bar{margin:.75rem 0}

  /* Swipe nav */
  .swipe-nav{padding:.25rem 0}

  /* Review filter */
  .review-filter-chips{padding:.5rem 0}
}

@media(min-width:1100px){
  .cards{grid-template-columns:repeat(3,minmax(0,1fr))}
  .wgrid{grid-template-columns:repeat(4,minmax(0,1fr))}
}

<script>
// ── CONFIG ────────────────────────────────────────────────
const PODIO={appId:29839792,viewId:61731109,cid:'google-sheets-sync-kqxsb2',csec:'WSRPgu0EuzhzTpvkVzfygSnmSZRmqnfYH8rfQJY4dHbDG7DFdgQ1mldX2nV3cAKo',user:'q.spencer@aveyo.com',pass:'Clippers332!'};

// [label, appId, viewId, warnAt, dangerAt, isWide, section]
const WIDGETS=[
  ['My Total Projects',          29839792,61731109,999,9999,false,'Projects'],
  ['Pipeline Review Not Set',    29839792,61743306,1,3,    false,null],
  ['Project Review Needed',      29839792,61743302,5,15,   true, null],
  ['Open Support Tickets',       29840119,61747488,3,8,    false,'Support Tickets'],
  ['Total in SOW',               29839685,61743309,999,9999,false,'Scope of Work'],
  ['Ready for SOW',              29839685,61743307,1,3,    false,null],
  ['SOW Rejections',             29839685,61743308,1,3,    false,null],
  ['Ready to Send Rep SOW',      29839685,61743310,1,3,    false,null],
  ['Projects w/ No Redlines',    29839685,61743311,1,3,    false,null],
  ['Rep SOW Pending Approval',   29839685,61743313,1,3,    false,null],
  ['Customer SOW Rejections',    29839685,61743314,1,2,    false,null],
  ['Customer SOW Sent',          29839685,61743315,999,9999,false,null],
  ['Ready to Send Cust SOW',     29839685,61743332,1,3,    false,null],
  ['Roof Review Needed (SOW)',    29839685,61743312,1,3,    false,null],
  ['Ready for Pre-Install',      29839773,61743334,1,5,    false,'Pre-Install'],
  ['Issues w/ Pre-Install',      29839773,61743335,1,3,    false,null],
  ['Design Change Orders',       29841104,61743336,1,5,    false,'Change Orders'],
  ['Customer Update Needed',     29839792,61743343,5,15,   false,'Communication'],
  ['Rep Update Needed',          29839792,61743344,3,8,    false,null],
  ['Roof Review Needed',         29839741,61743345,1,3,    false,'Roof Work'],
];

const FIELD={status:266489985,milestone:269930958,lastReview:275467370,notes:275751845,funding:268433601,lender:266828352,finance:274492780,daysSince:276204428,comments:266495555,workOrders:266494683,tickets:267693531,repInfo:266491096,customerPhone:266489983,milestones:266608138,fundingMilestones:268365536};
const CACHE_TTL=30*60*1000; // 30 minutes

// ── STATE ────────────────────────────────────────────────
let TOKEN=null;
let ALL_ITEMS=[];       // projects tab
let WLIST_ITEMS=[];     // widget list items
let FILTER='All';
let PREV_VIEW='home';   // where detail came from
let WLIST_LABEL='';
let CURRENT_WI=-1;

// ── PERSIST ──────────────────────────────────────────────
function saveToken(t){try{localStorage.setItem('aveyo_tok',t||'');}catch(e){}}
function loadToken(){try{return localStorage.getItem('aveyo_tok')||null;}catch(e){return null;}}
function clearToken(){try{localStorage.removeItem('aveyo_tok');}catch(e){}}

// ── VIEW MANAGEMENT ──────────────────────────────────────
const VERSION='v50';
const SUBS={home:'Dashboard',projects:'My Projects',wlist:'',detail:'Project Detail',auth:'Sign In',sow:'Scope of Work',kb:'Knowledge Base'};
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const isAuth=(v==='auth');
  document.getElementById('btn-logout').style.display=isAuth?'none':'block';
  document.getElementById('btn-refresh').style.display=(v==='home'||v==='projects'||v==='sow')?'block':'none';
  document.getElementById('bnav').style.display=isAuth?'none':'flex';
  document.getElementById('hdr-sub').textContent=v==='wlist'?WLIST_LABEL:(SUBS[v]||'');
}
function setActiveNav(tab){
  document.getElementById('nav-home').classList.toggle('active',tab==='home');
  document.getElementById('nav-projects').classList.toggle('active',tab==='projects');
  document.getElementById('nav-sow').classList.toggle('active',tab==='sow');
  document.getElementById('nav-kb').classList.toggle('active',tab==='kb');
}

// ── EVENT WIRING (no inline onclick) ─────────────────────
document.getElementById('btn-connect').addEventListener('click',doSignIn);
document.getElementById('btn-demo').addEventListener('click',enterDemoMode);
document.getElementById('btn-logout').addEventListener('click',doLogout);
document.getElementById('btn-refresh').addEventListener('click',doRefresh);
document.getElementById('nav-home').addEventListener('click',()=>{setActiveNav('home');showView('home');loadHome();});
document.getElementById('nav-sow').addEventListener('click',()=>{setActiveNav('sow');showView('sow');loadSOW();});
document.getElementById('nav-kb').addEventListener('click',()=>{setActiveNav('kb');showView('kb');loadKB();});
document.getElementById('nav-projects').addEventListener('click',()=>{setActiveNav('projects');showView('projects');if(!ALL_ITEMS.length)loadProjects();});
document.getElementById('wlist-back').addEventListener('click',()=>{showView(PREV_VIEW==='projects'?'projects':'home');setActiveNav(PREV_VIEW==='projects'?'projects':'home');});
document.getElementById('detail-back').addEventListener('click',()=>{
  showView(PREV_VIEW);
  setActiveNav(PREV_VIEW==='projects'?'projects':'home');
  // Restore scroll position
  setTimeout(()=>{
    const scrollKey = PREV_VIEW + '_scroll';
    if(SCROLL_POS[scrollKey] !== undefined){
      window.scrollTo(0, SCROLL_POS[scrollKey]);
    }
  }, 50);
});
document.getElementById('proj-signout').addEventListener('click',doLogout);
document.getElementById('search-input').addEventListener('input',renderCards);

// Widget clicks (delegated)
document.getElementById('home-content').addEventListener('click',function(e){
  const w=e.target.closest('[data-widget]');
  if(w){openWidgetList(parseInt(w.dataset.wi));}
});
// Widget list card clicks (delegated)
document.getElementById('wl-list').addEventListener('click',function(e){
  const c=e.target.closest('[data-itemid]');
  if(c){PREV_VIEW='wlist';openDetail(parseInt(c.dataset.itemid));}
});
// Projects card clicks (delegated)
document.getElementById('cards-list').addEventListener('click',function(e){
  const c=e.target.closest('[data-itemid]');
  if(c){PREV_VIEW='projects';openDetail(parseInt(c.dataset.itemid));}
});
// Chip clicks (delegated)
document.getElementById('filter-chips').addEventListener('click',function(e){
  const chip=e.target.closest('[data-chip]');
  if(chip){FILTER=chip.dataset.chip;renderChips();renderCards();}
});
// Collapsible toggle (delegated on document)
document.addEventListener('click',function(e){
  const hdr=e.target.closest('.coll-hdr');
  if(hdr)hdr.closest('.collapsible').classList.toggle('open');
});

// ── AUTH ─────────────────────────────────────────────────
async function doSignIn(){
  const user=document.getElementById('auth-user').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const msg=document.getElementById('auth-msg');
  const btn=document.getElementById('btn-connect');
  msg.className='msg msg-info';msg.textContent='Signing in...';btn.disabled=true;
  try{
    const res=await fetch('https://podio.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'password',username:user,password:pass,client_id:PODIO.cid,client_secret:PODIO.csec})});
    const d=await res.json();
    if(!d.access_token)throw new Error(d.error_description||'Sign in failed');
    TOKEN=d.access_token;saveToken(TOKEN);
    document.getElementById('bnav').style.display='flex';
    setActiveNav('home');showView('home');loadHome();
  }catch(e){msg.className='msg msg-error';msg.textContent=e.message;}
  btn.disabled=false;
}
function doLogout(){
  TOKEN=null;ALL_ITEMS=[];WLIST_ITEMS=[];FILTER='All';
  clearToken();clearCache();
  document.getElementById('cache-label').textContent='';
  document.getElementById('auth-user').value=PODIO.user;
  document.getElementById('auth-pass').value=PODIO.pass;
  document.getElementById('bnav').style.display='none';
  showView('auth');
}
function enterDemoMode(){
  DEMO_MODE=true;
  TOKEN='demo';
  document.getElementById('bnav').style.display='flex';
  setActiveNav('home');
  showView('home');
  loadHome();
}
function doRefresh(){
  const active=document.querySelector('.view.active');
  if(!active)return;

const CACHE_KEY='aveyo_cache_v30';
function loadCache(){try{return JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');}catch(e){return{};}}
function saveCache(c){try{localStorage.setItem(CACHE_KEY,JSON.stringify(c));}catch(e){}}
function clearCache(){try{localStorage.removeItem(CACHE_KEY);}catch(e){}}
function cGet(k){
  try{
    const c=loadCache()[k];
    return c&&Date.now()-c.ts<CACHE_TTL?c.v:null;
  }catch(e){return null;}
}
function cSet(k,v){
  try{
    const c=loadCache();
    c[k]={v,ts:Date.now()};
    saveCache(c);
  }catch(e){}
}

// ── API HELPERS ──────────────────────────────────────────
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
async function podioPost(url,body){
  const res=await fetch(url,{method:'POST',headers:{Authorization:'OAuth2 '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await res.json();
  if(d.error==='rate_limit')throw Object.assign(new Error('Rate limit — wait ~1 hour'),{rateLimit:true});
  if(!res.ok)throw new Error(d.error_description||'HTTP '+res.status);
  return d;
}
async function fetchCount(appId,viewId){
  const key=appId+'_'+viewId;
  const cached=cGet(key);if(cached!==null)return{n:cached,fresh:false};
  const d=await podioPost(`https://api.podio.com/item/app/${appId}/filter/${viewId}/`,{limit:1,offset:0});
  const n=d.filtered!==undefined?d.filtered:(d.total!==undefined?d.total:'—');
  cSet(key,n);return{n,fresh:true};
}
async function fetchAllItems(appId,viewId){
  let all=[],offset=0,total=null;
  while(true){
    const d=await podioPost(`https://api.podio.com/item/app/${appId}/filter/${viewId}/`,{limit:100,offset,sort_by:'last_edit_on',sort_desc:true});
    if(d.filtered!==undefined&&total===null)total=d.filtered;
    else if(d.total!==undefined&&total===null)total=d.total;
    all=all.concat(d.items||[]);
    if((d.items||[]).length<100||(total!==null&&all.length>=total))break;
    offset+=100;
  }
  return all;
}

  let rateLimited=false;
  for(let i=0;i<WIDGETS.length;i++){

// ── ITEM PARSING ─────────────────────────────────────────
function fv(raw,fid){
  const f=(raw.fields||[]).find(f=>f.field_id===fid);
  if(!f||!f.values||!f.values.length)return '';
  const v=f.values[0];
  if(v.value&&v.value.text)return v.value.text;
  if(v.start_date)return v.start_date;
  if(v.start)return v.start.split(' ')[0];
  if(v.value!==undefined){if(typeof v.value==='object'&&v.value!==null)return v.value.text||v.value.name||'';return String(v.value);}
  return v.text||'';
}
function fnum(raw,fid){
  const f=(raw.fields||[]).find(f=>f.field_id===fid);
  if(!f||!f.values||!f.values.length)return null;
  const v=f.values[0];if(v.value!==undefined)return Math.round(parseFloat(v.value));return null;
}
function parseTitle(t){
  const m=(t||'').match(/^(#\S+)\s+(.+?)\s+-\s+(.+)$/);
  return m?{num:m[1],name:m[2],address:m[3]}:{num:'',name:t||'',address:''};
}
function stripHtml(h){return(h||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();}
function parseItem(raw){
  const{num,name,address}=parseTitle(raw.title);
  return{id:raw.item_id,num,name,address,title:raw.title||'',
    status:fv(raw,FIELD.status),milestone:fv(raw,FIELD.milestone),
    lastReview:fv(raw,FIELD.lastReview),notes:stripHtml(fv(raw,FIELD.notes)),
    funding:fv(raw,FIELD.funding),lender:fv(raw,FIELD.lender),
    finance:fv(raw,FIELD.finance),daysSince:fnum(raw,FIELD.daysSince),
    comments:fv(raw,FIELD.comments),workOrders:fv(raw,FIELD.workOrders),
    repTickets:fv(raw,FIELD.tickets),repInfo:fv(raw,FIELD.repInfo),customerPhone:fv(raw,FIELD.customerPhone),milestones:fv(raw,FIELD.milestones),fundingMilestones:fv(raw,FIELD.fundingMilestones),raw};
}
function parseMilestones(raw){
  if(!raw)return[];
  const rows=[];
  const lines=raw.replace(/\*\*/g,'').split('\n');
  for(const line of lines){
    const clean=line.replace(/^\|/,'').replace(/\|$/,'').trim();
    const parts=clean.split('|').map(p=>p.trim());
    if(parts.length>=2&&parts[0]&&!parts[0].startsWith('---')&&parts[0]!=='STATUS/MILESTONE'&&parts[0]!=='STATUS'){
      const key=parts[0].trim();
      const val=parts[1].trim();
      if(key&&val&&val!=='---'&&val!==''){
        rows.push({k:key,v:val});
      }
    }
  }
  return rows;
}
function parseFundingMilestones(raw){
  if(!raw) return [];
  const rows = [];
  const lines = raw.replace(/\*\*/g,'').split('\n');
  for(const line of lines){
    const l = line.trim();
    if(!l || l === '---') continue;
    const colon = l.indexOf(':');
    if(colon > 0){
      const k = l.substring(0, colon).trim();
      const v = l.substring(colon+1).trim();
      if(k && v) rows.push({k, v});
    }
  }
  return rows;
}
function msValClass(v){
  const l=(v||'').toLowerCase();
  if(l.includes('complete')||l.includes('approved')||l.includes('yes')||l.includes('received'))return'done';
  if(l.includes('progress')||l.includes('submitted')||l.includes('pending')||l.includes('ready')||l.includes('scheduled'))return'progress';
  return'';
}
function parseRepName(repInfo){
  if(!repInfo)return'';
  const m=repInfo.match(/\*\*Rep Name:\s*\*\*\s*([^\n\*]+)/i);
  return m?m[1].trim():'';
}
function parseRepPhone(repInfo){
  if(!repInfo)return'';
  const m=repInfo.match(/\*\*Phone:\s*\*\*\s*([^\n\*]+)/i);
  return m?m[1].trim():'';
}
function msClass(ms){
  if(!ms)return 'ms-default';const s=ms.toLowerCase();
  if(s.includes('packet'))return 'ms-packet';
  if(s.includes('survey'))return 'ms-survey';
  if(s.includes('design'))return 'ms-design';
  if(s==='ntp')return 'ms-ntp';
  if(s.includes('scope'))return 'ms-scope';
  if(s.includes('utility'))return 'ms-utility';
  if(s.includes('permit'))return 'ms-permit';
  if(s.includes('install ready'))return 'ms-install';
  if(s.includes('install'))return 'ms-install';
  if(s.includes('inspect'))return 'ms-inspect';
  if(s.includes('pto'))return 'ms-pto';
  if(s.includes('complet')||s.includes('done'))return 'ms-complete';
  if(s.includes('hold'))return 'ms-hold';
  if(s.includes('cancel'))return 'ms-cancel';
  if(s.includes('hoa'))return 'ms-survey';
  return 'ms-default';
}

function openDetail(itemId){

  if(!item)return;
  // Save scroll position before leaving
  SCROLL_POS[PREV_VIEW+'_scroll'] = window.scrollY;

  // Set current list for swipe
  if(PREV_VIEW==='projects'){
    const q=(document.getElementById('search-input').value||'').toLowerCase();
    let items=ALL_ITEMS;
    if(FILTER!=='All')items=items.filter(i=>i.milestone===FILTER);
    if(q)items=items.filter(i=>[i.name,i.address,i.milestone,i.status,i.notes,i.num].join(' ').toLowerCase().includes(q));
    CURRENT_LIST=[...items];
  } else {
    CURRENT_LIST=[...WLIST_ITEMS];
  }

function parseBlocks(raw,sep){if(!raw)return[];return raw.split(sep).map(b=>b.trim()).filter(Boolean);}
function buildDetail(item){
  // Build milestone HTML before template string to avoid IIFE issues
  const msRows = parseMilestones(item.milestones);
  const fmRows = parseFundingMilestones(item.fundingMilestones);
  let msHtml = '';
  if(msRows.length || fmRows.length){
    const allRows = [...msRows, ...(fmRows.length ? [{k:'Funding Milestones', v:'', divider:true}, ...fmRows] : [])];
    const innerHtml = allRows.map(r => {
      if(r.divider) return `<div style="font-size:10px;font-weight:700;color:var(--text3);padding:6px 1rem 2px;text-transform:uppercase;letter-spacing:.06em;background:var(--bg2)">${x(r.k)}</div>`;
      const col = msValClass(r.v)==='done'?'#3B6D11':msValClass(r.v)==='progress'?'var(--amber-dark)':'var(--text)';
      return `<div class="drow"><span class="dk">${x(r.k)}</span><span class="dv" style="color:${col}">${x(r.v)}</span></div>`;
    }).join('');
    msHtml = `<div class="collapsible"><div class="coll-hdr"><span class="coll-title">Milestones <span class="cnt">${msRows.length}</span></span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="coll-body">${innerHtml}</div></div>`;
  }
  const rows=[
    ['Project status',item.status],['Milestone',item.milestone],
    ['Lender',item.lender],['Finance type',item.finance],
    ['Funding status',item.funding],
    ['Days since review',item.daysSince!==null?item.daysSince+' days':'']
  ].filter(r=>r[1]);

  const cBlocks=parseBlocks(item.comments,/\*{3}/);
  const cHtml=cBlocks.length?cBlocks.map(b=>{
    const lines=b.split('\n').map(l=>l.trim()).filter(Boolean);
    const m=lines[0]&&lines[0].match(/^(\d{4}-\d{2}-\d{2})\s+\d{2}:\d{2}:\d{2}\s+(.+)/);
    const body=lines.slice(m?1:0).join(' ');
    return`<div class="te"><div class="te-date">${x(m?m[1]:'')}${m?' · '+x(m[2]):''}</div><div class="te-body">${x(body.substring(0,300))}${body.length>300?'...':''}</div></div>`;

  const wBlocks=parseBlocks(item.workOrders,/\\---|\n---\n/).filter(b=>b.includes('WO-')||b.includes('Type:'));
  const wHtml=wBlocks.length?wBlocks.map(b=>{

    return`<div class="te"><div class="te-date">${woId?'WO-'+woId:''}${appt?' · '+x(appt.trim()):''}</div>${type?`<div style="font-weight:600;font-size:12px;color:var(--text)">${x(type.trim())}</div>`:''} ${desc?`<div class="te-body">${x(desc.trim().substring(0,200))}</div>`:''} ${status?`<span class="te-status ${status.toLowerCase().includes('complet')?'ts-complete':'ts-open'}">${x(status.trim())}</span>`:''}</div>`;
  }).join(''):'<div class="te"><div class="te-body" style="color:var(--text3)">No work orders.</div></div>';

  const tBlocks=parseBlocks(item.repTickets,/\\---|\n---\n/).filter(b=>b.includes('Ticket')||b.includes('Status:')).reverse();
  const tHtml=tBlocks.length?tBlocks.map(b=>{
    const status=(b.match(/Status:\*?\*?\s*([^\n<*\[]+)/i)||[])[1]||'';

  updateSwipeNav();
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-hdr">
      <div class="detail-id">${x(item.num)}</div>

        <div class="drow-edit">

            <button class="date-save-btn" id="detail-review-save" data-itemid="${item.id}">Save</button>
            <span class="date-saved" id="detail-review-saved" style="display:none">✓ Saved</span>

    </div>
    ${msHtml}
    ${item.notes?`<div class="collapsible open"><div class="coll-hdr"><span class="coll-title">Project notes</span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="coll-body"><div class="notes-body">${x(item.notes)}</div></div></div>`:''}
    <div class="collapsible">
      <div class="coll-hdr"><span class="coll-title">Comments <span class="cnt">${cBlocks.length}</span></span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>

    </div>
    <div class="collapsible">

      <div class="coll-body">${wHtml}</div>

    <div class="collapsible">

function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}


// ── COMPOSE SHEET ──────────────────────────────────────────
const VPS = 'https://alternatives-gonna-subjects-curves.trycloudflare.com';
// Which widget indexes trigger compose actions
const COMPOSE_WIDGET = {
  16: 'customer',  // Customer Update Needed
  17: 'rep',       // Rep Update Needed
};
// Podio field IDs for writing
const PODIO_FIELD = {rep: 267123636, customer: 270976084, review: 275751845};

let COMPOSE_ITEM = null;   // current item being composed
let COMPOSE_TYPE = null;   // 'rep' or 'customer'
let COMPOSE_DRAFT = null;  // saved draft when minimized
let CURRENT_ITEM_ID = null; // currently open detail item
let CURRENT_LIST = [];      // current filtered/active list for swipe
let SCROLL_POS = {};        // saved scroll positions by view
let REVIEW_FILTER = 'all';  // filter for Project Review Needed widget

function isComposeWidget(wi) {
  return wi in COMPOSE_WIDGET;
}

// Called when a Send action button is tapped on a card
function openCompose(itemId, type) {
  const item = ALL_ITEMS.find(i=>i.id===itemId) || WLIST_ITEMS.find(i=>i.id===itemId);
  if (!item) return;
  COMPOSE_ITEM = item;
  COMPOSE_TYPE = type;

  // Set up UI
  const badge = document.getElementById('compose-badge');
  badge.textContent = type === 'rep' ? 'Rep Update' : type === 'customer' ? 'Customer Update' : 'Project Review';
  badge.className = 'compose-type-badge ' + (type==='rep'?'compose-type-rep':type==='customer'?'compose-type-customer':'compose-type-review');
  document.getElementById('compose-title').textContent = item.name;
  document.getElementById('compose-subtitle').textContent = item.address || item.title;
  document.getElementById('compose-loading').style.display = 'none';
  document.getElementById('compose-body').style.display = 'none';
  document.getElementById('compose-result').style.display = 'none';
  document.getElementById('compose-textarea').value = '';
  document.getElementById('compose-chars').textContent = '';
  document.getElementById('compose-send').disabled = true;
  document.getElementById('compose-send').textContent = 'Send';

  // Show overlay
  document.getElementById('compose-overlay').classList.add('open');

  // Generate message fresh via AI
  fetchComposeMessage(item.id, type);
}

async function fetchComposeMessage(itemId, type) {
  const loadingEl = document.getElementById('compose-loading');
  const bodyEl = document.getElementById('compose-body');
  const ta = document.getElementById('compose-textarea');
  const sendBtn = document.getElementById('compose-send');

  loadingEl.innerHTML = '<div class="spinner"></div>Generating message with AI...';
  loadingEl.style.display = 'block';
  bodyEl.style.display = 'none';
  sendBtn.disabled = true;

  if(DEMO_MODE){
    await delay(1200);
    const demoMsgs={
      rep: "Hi [Rep Name], just a quick update on your project — we're currently in the permitting stage and have submitted all required documents to the AHJ. We expect approval within 2-3 weeks and will keep you posted on any updates.",
      customer: "Hi [Customer], we wanted to touch base on your solar project! Everything is progressing well — we're currently working through the permit approval process and will reach out as soon as we have a confirmed install date.",
      review: new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) + ' Project Review: This project is currently in the Permit stage, pending final inspection before permits can be approved. Our permitting team has a follow-up scheduled for next week. We are waiting on the local authority to complete the inspection so we can move forward with permit approval and get the project inspection scheduled.'
    };
    ta.value = demoMsgs[type] || demoMsgs.rep;
    ta.placeholder = '';
    updateCharCount();
    sendBtn.disabled = false;
    document.getElementById('compose-subtitle').textContent = 'Stage: Demo · Review and edit before sending';
    loadingEl.style.display = 'none';
    bodyEl.style.display = 'block';
    return;
  }

  try {
    const endpoint = type === 'review' ? '/generate-review' : '/generate-message';
    const res = await fetch(VPS + endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({item_id: itemId, type})
    });
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message || 'Generation failed');
    const msg = data.message || '';
    ta.value = msg;
    ta.placeholder = '';
    updateCharCount();
    sendBtn.disabled = !msg.trim();
    if (data.stage) {
      document.getElementById('compose-subtitle').textContent = 'Stage: ' + data.stage + ' · Review and edit before saving';
    }
  } catch(e) {
    ta.value = '';
    ta.placeholder = 'AI generation failed. You can type manually and still send.';
    sendBtn.disabled = false;
    const result = document.getElementById('compose-result');
    result.className = 'compose-result error';
    result.textContent = 'Could not generate: ' + e.message;
    result.style.display = 'block';
  }
  loadingEl.style.display = 'none';
  bodyEl.style.display = 'block';
}

function updateCharCount() {
  const ta = document.getElementById('compose-textarea');
  const len = ta.value.length;
  document.getElementById('compose-chars').textContent = len + ' characters';
  document.getElementById('compose-send').disabled = !ta.value.trim();
}

function minimizeCompose() {
  // Save current draft
  COMPOSE_DRAFT = document.getElementById('compose-textarea').value;
  // Hide overlay but keep state
  document.getElementById('compose-overlay').classList.remove('open');
  // Show mini bar
  const typeLabel = COMPOSE_TYPE==='rep'?'Rep Update':COMPOSE_TYPE==='customer'?'Customer Text':'Project Review';
  document.getElementById('compose-mini-title').textContent = typeLabel + ' — ' + (COMPOSE_ITEM?COMPOSE_ITEM.name:'');
  const chars = COMPOSE_DRAFT.length;
  document.getElementById('compose-mini-sub').textContent = chars > 0 ? chars + ' chars · tap to continue' : 'Tap to continue editing';
  document.getElementById('compose-mini').classList.add('visible');
}

function restoreCompose() {
  if(!COMPOSE_ITEM) return;
  document.getElementById('compose-mini').classList.remove('visible');
  document.getElementById('compose-overlay').classList.add('open');
  // Restore draft if textarea is empty or matches what we saved
  if(COMPOSE_DRAFT !== null) {
    const ta = document.getElementById('compose-textarea');
    if(!ta.value || ta.value === COMPOSE_DRAFT) {
      ta.value = COMPOSE_DRAFT;
      updateCharCount();
    }
  }
}

function closeCompose() {
  document.getElementById('compose-overlay').classList.remove('open');
  document.getElementById('compose-mini').classList.remove('visible');
  COMPOSE_ITEM = null;
  COMPOSE_TYPE = null;
  COMPOSE_DRAFT = null;
}

async function doSend() {
  const msg = document.getElementById('compose-textarea').value.trim();
  if (!msg || !COMPOSE_ITEM || !COMPOSE_TYPE) return;

  const btn = document.getElementById('compose-send');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const fieldId = PODIO_FIELD[COMPOSE_TYPE];
  const itemId = COMPOSE_ITEM.id;

  if(DEMO_MODE){
    btn.disabled=true; btn.textContent='Sending...';
    await delay(1000);
    const result=document.getElementById('compose-result');
    result.className='compose-result success';
    result.textContent=COMPOSE_TYPE==='rep'?'✓ Rep update sent (demo)':COMPOSE_TYPE==='customer'?'✓ Customer message sent (demo)':'✓ Project notes saved (demo)';
    result.style.display='block';
    document.getElementById('compose-body').style.display='none';
    btn.textContent='Sent ✓';
    setTimeout(closeCompose,1800);
    return;
  }

  try {
    // For review: fix date to today and post as comment + save to notes field
    let finalMsg = msg;
    if(COMPOSE_TYPE === 'review'){
      const today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      // Replace whatever date is at the start with today
      finalMsg = finalMsg.replace(/^[A-Za-z]+,\s[A-Za-z]+\s\d+,\s\d{4}/, today);
    }

    // Write to Podio field
    const res = await fetch(
      'https://api.podio.com/item/' + itemId + '/value/' + fieldId,
      {
        method: 'PUT',
        headers: {
          'Authorization': 'OAuth2 ' + TOKEN,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({value: finalMsg})
      }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error_description || 'HTTP ' + res.status);
    }

    // For review: also post as a Podio comment so it shows in Activity
    if(COMPOSE_TYPE === 'review'){
      try{
        await fetch(
          'https://api.podio.com/comment/item/' + itemId + '/',
          {
            method: 'POST',
            headers: {
              'Authorization': 'OAuth2 ' + TOKEN,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({value: finalMsg})
          }
        );
      }catch(e){}
    }

    const result = document.getElementById('compose-result');
    result.className = 'compose-result success';
    result.textContent = COMPOSE_TYPE === 'rep'
      ? '✓ Rep update sent'
      : COMPOSE_TYPE === 'customer'
      ? '✓ Customer message sent'
      : '✓ Review saved to notes & posted to activity';
    result.style.display = 'block';
    document.getElementById('compose-body').style.display = 'none';
    btn.textContent = 'Saved ✓';

    // For rep/customer — clear field after send so days-since resets
    // For review — keep the notes, just close
    if(COMPOSE_TYPE !== 'review'){
      setTimeout(async () => {
        try {
          await fetch(
            'https://api.podio.com/item/' + itemId + '/value/' + fieldId,
            {method: 'DELETE', headers: {'Authorization': 'OAuth2 ' + TOKEN}}
          );
        } catch(e) {}
        closeCompose();
      }, 1800);
    } else {
      setTimeout(closeCompose, 1800);
    }

  } catch(e) {
    const result = document.getElementById('compose-result');
    result.className = 'compose-result error';
    result.textContent = 'Failed to send: ' + e.message;
    result.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}

function applyBold(ta){
  if(!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.substring(start, end);
  if(!selected) return;
  // Toggle bold — if already bold, remove; otherwise add
  if(selected.startsWith('**') && selected.endsWith('**')){
    const inner = selected.slice(2,-2);
    ta.value = ta.value.substring(0,start) + inner + ta.value.substring(end);
    ta.setSelectionRange(start, start+inner.length);
  } else {
    const bolded = '**' + selected + '**';
    ta.value = ta.value.substring(0,start) + bolded + ta.value.substring(end);
    ta.setSelectionRange(start, start+bolded.length);
  }
  ta.dispatchEvent(new Event('input'));
  ta.focus();
}

async function inlineGenerate(itemId, type){

  status.textContent='⏳ Generating with AI...';

    await delay(1200);
    const msgs={rep:'Hello [Rep], this project is currently in the permit stage. Our permitting team has a follow-up scheduled and we will reach out once we have an update.',customer:'Hi [Customer], we wanted to touch base on your solar project. We are currently in the permit stage and will reach out once we have an update on approval.',review:new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' Project Review: This project is currently in the Permit stage, pending final inspection. We are waiting on the local authority and will reach out once we have an update.'};
    ta.value=msgs[type]||'';
    status.textContent='';
    const sendBtn=document.querySelector('[data-icsend="'+type+'"][data-itemid="'+itemId+'"]');
    if(sendBtn) sendBtn.disabled=!ta.value.trim();
    return;
  }
  try{
    const endpoint=type==='review'?'/generate-review':'/generate-message';
    const res=await fetch(VPS+endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({item_id:itemId,type})});
    const data=await res.json();
    if(data.status!=='ok') throw new Error(data.message||'Failed');
    ta.value=data.message||'';
    ta.placeholder='';
    if(data.stage) status.textContent='Stage: '+data.stage;
    else status.textContent='';
    const sendBtn=document.querySelector('[data-icsend="'+type+'"][data-itemid="'+itemId+'"]');
    if(sendBtn) sendBtn.disabled=!ta.value.trim();
  }catch(e){
    status.textContent='⚠️ '+e.message;
    ta.placeholder='Generation failed. Type manually.';
  }
}
async function inlineSend(itemId, type){
  const taId='ic-'+(type==='customer'?'cust':type)+'-ta-'+itemId;
  const statusId='ic-'+(type==='customer'?'cust':type)+'-status-'+itemId;
  const ta=document.getElementById(taId);
  const status=document.getElementById(statusId);
  const sendBtn=document.querySelector('[data-icsend="'+type+'"][data-itemid="'+itemId+'"]');
  if(!ta||!status) return;
  let msg=ta.value.trim();
  if(!msg) return;
  // Fix date for review
  if(type==='review'){
    const today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    msg=msg.replace(/^[A-Za-z]+,\s[A-Za-z]+\s\d+,\s\d{4}/,today);
  }
  if(DEMO_MODE){
    sendBtn.disabled=true;
    status.textContent='⏳ Sending...';
    await delay(1000);
    status.textContent=type==='rep'?'✓ Rep update sent (demo)':type==='customer'?'✓ Customer message sent (demo)':'✓ Review saved (demo)';
    ta.value='';
    return;
  }
  sendBtn.disabled=true;
  status.textContent='⏳ Sending...';
  try{
    const fieldId=PODIO_FIELD[type];
    const res=await fetch('https://api.podio.com/item/'+itemId+'/value/'+fieldId,{method:'PUT',headers:{'Authorization':'OAuth2 '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({value:msg})});
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error_description||'HTTP '+res.status);}
    if(type==='review'){
      try{await fetch('https://api.podio.com/comment/item/'+itemId+'/',{method:'POST',headers:{'Authorization':'OAuth2 '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({value:msg})});}catch(e){}
    }
    status.textContent=type==='rep'?'✓ Rep update sent':type==='customer'?'✓ Customer message sent':'✓ Review saved to notes & activity';
    if(type!=='review'){
      setTimeout(async()=>{
        try{await fetch('https://api.podio.com/item/'+itemId+'/value/'+fieldId,{method:'DELETE',headers:{'Authorization':'OAuth2 '+TOKEN}});}catch(e){}
      },1800);
    }
    ta.value='';
    sendBtn.disabled=true;
  }catch(e){
    status.textContent='⚠️ Failed: '+e.message;
    sendBtn.disabled=false;
  }
}

// Distance adder tiers (miles from branch)
const BRANCHES = [
  {name: 'Springfield, IL', lat: 39.7817, lng: -89.6501},
  {name: 'Frankfort, IL', lat: 41.4959, lng: -87.8534},
];

function haversineDistance(lat1, lon1, lat2, lon2){
  const R = 3958.8; // miles
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getDistanceAdder(lat, lng){
  if(!lat||!lng) return null;
  let minDist = Infinity;
  let closestBranch = '';
  BRANCHES.forEach(b=>{
    const d = haversineDistance(parseFloat(lat), parseFloat(lng), b.lat, b.lng);
    if(d < minDist){ minDist = d; closestBranch = b.name; }
  });
  const dist = Math.round(minDist);
  let tier = null;
  let cost = null;
  if(dist >= 200){ tier='Tier 3 (200+ miles)'; cost='Quote'; }
  else if(dist >= 125){ tier='Tier 2 (125-199 miles)'; cost='$0.65/watt'; }
  else if(dist >= 75){ tier='Tier 1 (75-124 miles)'; cost='$0.50/watt'; }
  return {dist, tier, cost, branch: closestBranch};
}

function sowFV(fields, fid){
  const f = (fields||[]).find(f=>f.field_id===fid);
  if(!f||!f.values||!f.values.length) return null;
  const v = f.values[0];
  if(v.value && v.value.text) return v.value.text;
  if(v.value !== undefined) return v.value;
  return null;
}

  const roofReview = sowFV(fields, SOW_FIELD.roofReview);
  const repScopeCreation = sowFV(fields, SOW_FIELD.repScopeCreation);
  const repScopeApproval = sowFV(fields, SOW_FIELD.repScopeApproval);

  const contractPrice = sowFV(fields, SOW_FIELD.contractPrice);

  const lat = latField?.values?.[0]?.value;
  const lng = lngField?.values?.[0]?.value;
  const distInfo = getDistanceAdder(lat, lng);

    const isGood = goodVals.some(g=>val.toLowerCase().includes(g.toLowerCase()));
    const isWarn = warnVals.some(w=>val.toLowerCase().includes(w.toLowerCase()));

    if(isWarn) return '<span class="sow-check-icon warn">!</span>';

// ── SOW PRODUCTION CHECK ─────────────────────────────────
async function loadSoldProduction(sowItemId){
  const el = document.getElementById('sow-sold-prod-'+sowItemId);
  if(!el) return;
  if(DEMO_MODE){el.textContent='12,927 kWh';return;}
  try{
    const res = await fetch(VPS+'/sow-production-check',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sow_item_id: sowItemId, new_production: null})
    });
    const d = await res.json();
    if(d.status==='ok' && d.sold_production){
      el.textContent = parseInt(d.sold_production).toLocaleString() + ' kWh';
    } else {
      el.textContent = 'Not found';
    }
  }catch(e){
    el.textContent = 'Error loading';
  }
}

// Wire production check button
document.addEventListener('click', function(e){
  const btn = e.target.closest('.sow-co-btn[data-sowitemid]');
  if(btn) checkProduction(parseInt(btn.dataset.sowitemid));
});

async function checkProduction(sowItemId){
  const input = document.getElementById('sow-new-prod-'+sowItemId);
  const btn = document.getElementById('sow-co-btn-'+sowItemId);
  const result = document.getElementById('sow-co-result-'+sowItemId);
  if(!input||!btn||!result) return;
  const newProd = parseFloat(input.value);
  if(!newProd||isNaN(newProd)){
    result.className='sow-co-result error';
    result.textContent='Please enter the new production value from the planset';
    result.style.display='block';
    return;
  }
  btn.disabled=true;
  btn.textContent='Checking...';
  result.style.display='none';
  if(DEMO_MODE){
    await delay(1000);
    const sold=12927, diff=Math.abs(newProd-sold)/sold*100;
    if(diff>5){
      result.className='sow-co-result success';
      result.textContent='⚠️ '+diff.toFixed(1)+'% difference — Change order comment posted to SOW in Podio!';
    } else {
      result.className='sow-co-result success';
      result.textContent='✓ Within 5% tolerance ('+diff.toFixed(1)+'% difference) — No change order needed';
    }
    result.style.display='block';
    btn.disabled=false;
    btn.textContent='Check & Create Change Order if Needed';
    return;
  }
  try{
    const res = await fetch(VPS+'/sow-production-check',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sow_item_id: sowItemId, new_production: newProd})
    });
    const d = await res.json();
    if(d.status!=='ok') throw new Error(d.message||'Failed');
    if(d.change_needed){
      result.className='sow-co-result success';
      result.textContent='⚠️ '+d.diff_pct+'% difference — Change order comment posted to SOW in Podio!';
    } else {
      result.className='sow-co-result success';
      result.textContent='✓ Within 5% tolerance ('+d.diff_pct+'% difference) — No change order needed';
    }
    result.style.display='block';
    // Update sold production display
    if(d.sold_production){
      const el=document.getElementById('sow-sold-prod-'+sowItemId);
      if(el) el.textContent=parseInt(d.sold_production).toLocaleString()+' kWh';
    }
  }catch(e){
    result.className='sow-co-result error';
    result.textContent='Error: '+e.message;
    result.style.display='block';
  }
  btn.disabled=false;
  btn.textContent='Check & Create Change Order if Needed';
}

<script>
if('serviceWorker' in navigator){
  // Force reload when new service worker takes control
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(!refreshing){ refreshing=true; window.location.reload(); }
  });
  navigator.serviceWorker.register('./sw.js?v=50').then(reg => {
    // Check for update immediately on every page load
    reg.update();
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if(sw.state === 'activated') window.location.reload();
      });
    });
  });
}
</script>
