<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Aveyo"/>
<meta name="theme-color" content="#185FA5"/>
<title>Aveyo Solar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --green-light:#EAF3DE;--green-dark:#27500A;
  --amber-light:#FAEEDA;--amber-dark:#633806;
  --red-light:#FCEBEB;--red-dark:#791F1F;
  --purple-light:#EEEDFE;--purple-dark:#3C3489;
  --teal-light:#E1F5EE;--teal-dark:#085041;
  --pink-light:#FBEAF0;--pink-dark:#72243E;
  --gray-light:#F1EFE8;--gray-dark:#444441;
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --radius:8px;--radius-lg:12px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#262624;--bg3:#2e2e2b;
  --text:#f0efea;--text2:#a8a79f;--text3:#6e6d67;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --blue-light:#0c3d6b;--blue-dark:#90c4f0;
  --green-light:#1a3a0a;--green-dark:#a8d870;
  --amber-light:#3d2a05;--amber-dark:#f5c060;
  --red-light:#3d1010;--red-dark:#f09090;
  --purple-light:#26215C;--purple-dark:#AFA9EC;
  --teal-light:#04342C;--teal-dark:#5DCAA5;
  --pink-light:#4B1528;--pink-dark:#ED93B1;
  --gray-light:#2e2e2b;--gray-dark:#c8c7bf
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:5rem}

/* Header */
.hdr{background:var(--blue);color:#fff;padding:1rem 1rem .875rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.hdr-title{font-size:16px;font-weight:600}
.hdr-sub{font-size:12px;opacity:.75;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:12px;padding:5px 10px;border-radius:var(--radius);cursor:pointer;font-family:inherit}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:.5px solid var(--border2);display:flex;z-index:200}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 14px;cursor:pointer;border:none;background:transparent;font-family:inherit;gap:3px}
.bnav-btn svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.8}
.bnav-btn span{font-size:10px;color:var(--text3);font-weight:500}
.bnav-btn.active svg{stroke:var(--blue)}
.bnav-btn.active span{color:var(--blue)}

/* Auth */
.section{background:var(--bg);border-radius:var(--radius-lg);margin:.75rem;padding:1.25rem;border:.5px solid var(--border)}
.field{margin-bottom:.875rem}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.field input{width:100%;padding:10px 12px;font-size:14px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit}
.field input:focus{border-color:var(--blue)}
.btn{width:100%;padding:11px;border-radius:var(--radius);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--bg2);color:var(--text);border:.5px solid var(--border2);margin-top:8px}
.btn-outline{background:transparent;color:var(--blue);border:.5px solid var(--blue);margin-top:8px}
.msg{font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.msg-error{color:#c0392b}.msg-success{color:#27ae60}.msg-info{color:var(--text2)}

/* Home widgets */
.section-label{font-size:13px;font-weight:700;color:var(--text);padding:1rem .75rem .5rem;letter-spacing:.01em}
.widget-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:0 .75rem .5rem}
.widget{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem;cursor:pointer;transition:border-color .15s}
.widget:active{border-color:var(--blue)}
.widget-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;line-height:1.3}
.widget-num{font-size:36px;font-weight:700;color:var(--text);line-height:1}
.widget-num.blue{color:var(--blue)}
.widget-num.green{color:#3B6D11}
.widget-num.amber{color:var(--amber-dark)}
.widget-num.red{color:#A32D2D}
.widget-num.purple{color:var(--purple-dark)}
.widget-rows{margin-top:8px}
.widget-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:.5px solid var(--border);font-size:12px}
.widget-row:last-child{border-bottom:none}
.widget-row .rk{color:var(--text2)}
.widget-row .rv{font-weight:600;color:var(--text)}
.widget-wide{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);margin:0 .75rem .5rem;padding:1rem;cursor:pointer}
.widget-wide .widget-title{margin-bottom:6px}
.spin-sm{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

/* Search & chips */
.search-wrap{margin:.75rem}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-lg);padding:10px 14px}
.search-box svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0}
.search-box input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);outline:none;font-family:inherit}
.search-box input::placeholder{color:var(--text3)}
.chips{display:flex;gap:6px;overflow-x:auto;padding:0 .75rem .75rem;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:99px;border:.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.active{color:#fff;border-color:transparent}

/* Project cards */
.cards{padding:0 .75rem}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.125rem;margin-bottom:.625rem;cursor:pointer}
.card:active{border-color:var(--blue)}
.card-id{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.04em;margin-bottom:2px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px}
.card-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.card-addr{font-size:12px;color:var(--text2);margin-bottom:5px}
.card-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}
.meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.meta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.meta.warn{color:var(--amber-dark);font-weight:500}
.card-note{font-size:11px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:6px 8px;margin-top:7px;line-height:1.5;border-left:2px solid var(--blue)}

/* Badges */
.badge{font-size:11px;padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0;font-weight:600}
.ms-packet{background:var(--purple-light);color:var(--purple-dark)}
.ms-survey{background:var(--amber-light);color:var(--amber-dark)}
.ms-design{background:var(--pink-light);color:var(--pink-dark)}
.ms-ntp,.ms-scope,.ms-install{background:var(--blue-light);color:var(--blue-dark)}
.ms-utility{background:var(--teal-light);color:var(--teal-dark)}
.ms-permit{background:var(--amber-light);color:var(--amber-dark)}
.ms-inspect{background:var(--purple-light);color:var(--purple-dark)}
.ms-pto{background:var(--teal-light);color:var(--teal-dark)}
.ms-complete{background:var(--green-light);color:var(--green-dark)}
.ms-hold,.ms-cancel{background:var(--red-light);color:var(--red-dark)}
.ms-default{background:var(--gray-light);color:var(--gray-dark)}

/* Collapsible detail sections */
.collapsible{background:var(--bg);border-radius:var(--radius-lg);margin:0 .75rem .625rem;border:.5px solid var(--border);overflow:hidden}
.coll-hdr{display:flex;justify-content:space-between;align-items:center;padding:.875rem 1rem;cursor:pointer;user-select:none}
.coll-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.coll-title .cnt{background:var(--bg2);color:var(--text3);font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500}
.coll-arrow{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.collapsible.open .coll-arrow{transform:rotate(180deg)}
.coll-body{display:none;border-top:.5px solid var(--border)}
.collapsible.open .coll-body{display:block}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 1rem;border-bottom:.5px solid var(--border);font-size:13px;gap:12px}
.drow:last-child{border-bottom:none}
.dk{color:var(--text2);flex-shrink:0;max-width:45%}
.dv{color:var(--text);text-align:right;word-break:break-word;max-width:53%}
.te{padding:10px 1rem;border-bottom:.5px solid var(--border);font-size:12px;line-height:1.5}
.te:last-child{border-bottom:none}
.te-date{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.te-body{color:var(--text2);margin-top:2px}
.te-status{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;margin-top:4px;font-weight:500}
.ts-complete{background:var(--green-light);color:var(--green-dark)}
.ts-assigned{background:var(--amber-light);color:var(--amber-dark)}
.ts-open{background:var(--blue-light);color:var(--blue-dark)}
.notes-body{padding:.875rem 1rem;font-size:13px;line-height:1.6;color:var(--text2)}
.detail-back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--blue);cursor:pointer;margin:.75rem;font-weight:500}
.detail-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.detail-hdr{margin:0 .75rem .75rem}
.detail-id{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.04em;margin-bottom:3px}
.detail-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.detail-addr{font-size:13px;color:var(--text2);margin-bottom:8px}

/* Loading */
.loading{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .875rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:14px;line-height:1.6}
.progress-wrap{width:200px;margin:10px auto 0;background:rgba(0,0,0,.1);border-radius:99px;height:4px;overflow:hidden}
.progress-bar{height:4px;background:var(--blue);border-radius:99px;transition:width .3s}

/* Views */
.view{display:none}
.view.active{display:block}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-logo"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
    <div style="flex:1;min-width:0">
      <div class="hdr-title">Aveyo Solar</div>
      <div class="hdr-sub" id="hdr-sub">Dashboard</div>
    </div>
    <div class="hdr-right">
      <button class="hdr-btn" id="btn-refresh" onclick="onRefresh()" style="display:none">Refresh</button>
      <button class="hdr-btn" id="btn-logout" onclick="logout()" style="display:none">Sign out</button>
    </div>
  </div>

  <!-- AUTH -->
  <div id="view-auth" class="view active">
    <div class="section" style="margin-top:.75rem">
      <div style="font-size:14px;font-weight:600;margin-bottom:.875rem">Sign in to Podio</div>
      <div class="field"><label>Username</label><input type="email" id="auth-user" autocomplete="email"/></div>
      <div class="field"><label>Password</label><input type="password" id="auth-pass" autocomplete="current-password"/></div>
      <button class="btn btn-primary" id="btn-connect" onclick="connectPodio()">Sign in</button>
      <div class="msg msg-info" id="auth-msg"></div>
    </div>
  </div>

  <!-- HOME -->
  <div id="view-home" class="view">
    <div id="home-content"></div>
  </div>

  <!-- PROJECTS LIST -->
  <div id="view-projects" class="view">
    <div class="search-wrap" style="margin-top:.75rem">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search by name, address, milestone..." oninput="renderCards()"/>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:0 .75rem .75rem" id="proj-stats"></div>
    <div class="chips" id="filter-chips"></div>
    <div class="cards">
      <div class="loading" id="cards-loading" style="display:none"><div class="spinner"></div><div id="loading-msg">Loading...</div><div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:5%"></div></div></div>
      <div id="cards-list"></div>
    </div>
    <div style="padding:0 .75rem;margin-top:.5rem"><button class="btn btn-secondary" style="font-size:12px" onclick="logout()">Sign out</button></div>
  </div>

  <!-- DETAIL -->
  <div id="view-detail" class="view">
    <div class="detail-back" onclick="showView('projects')">
      <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>Back to projects
    </div>
    <div id="detail-body"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav" id="bnav" style="display:none">
    <button class="bnav-btn active" id="nav-home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="bnav-btn" id="nav-projects" onclick="switchTab('projects')">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>Projects</span>
    </button>
  </div>
</div>

<script>
const PODIO = {
  appId:'29839792', viewId:'61731109',
  cid:'google-sheets-sync-kqxsb2',
  csec:'WSRPgu0EuzhzTpvkVzfygSnmSZRmqnfYH8rfQJY4dHbDG7DFdgQ1mldX2nV3cAKo',
  user:'q.spencer@aveyo.com', pass:'Clippers332!'
};

// App IDs confirmed from VPS
const APPS = {
  project:29839792, tickets:29840119, scopeOfWork:29839685,
  installReady:29839773, changeOrders:29841104, roofs:29839741
};

// View IDs from Podio URLs
const VIEWS = {
  qAll:61731109,
  pipelineNotSet:61743306, reviewNeeded:61743302,
  sowReady:61743307, sowRejections:61743308, sowTotal:61743309,
  sowRepReady:61743310, sowLowRedlines:61743311, roofReviewSOW:61743312,
  sowRepPending:61743313, sowCustomerRejections:61743314, sowCustomerSent:61743315,
  sowCustomerReady:61743332,
  preInstallReady:61743334, preInstallIssues:61743335,
  changeOrders:61743336,
  customerUpdate:61743343, repUpdate:61743344, roofReview:61743345
};

const F = {
  status:266489985, milestoneStatus:269930958, lastReview:275467370,
  notes:275751845, fundingStatus:268433601, lender:266828352,
  financeType:274492780, daysSince:276204428,
  projectComments:266495555, workOrders:266494683, repTicketsList:267693531
};

let S = { token:null, items:[], filter:'All', homeData:{}, currentTab:'home' };

function persist(){ try{ localStorage.setItem('aveyo_v15', JSON.stringify({token:S.token})); }catch(e){} }
function loadPersist(){ try{ const d=JSON.parse(localStorage.getItem('aveyo_v15')||'{}'); if(d.token) S.token=d.token; }catch(e){} }

function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('btn-logout').style.display = v!=='auth'?'block':'none';
  document.getElementById('btn-refresh').style.display = (v==='home'||v==='projects')?'block':'none';
  document.getElementById('bnav').style.display = v!=='auth'?'flex':'none';
  const subs={home:'Dashboard',projects:'My Projects',detail:'Project Detail',auth:'Sign In'};
  document.getElementById('hdr-sub').textContent = subs[v]||'';
}

function switchTab(tab){
  S.currentTab = tab;
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='home'){ showView('home'); if(!Object.keys(S.homeData).length) loadHome(); }
  else if(tab==='projects'){ showView('projects'); if(!S.items.length) loadProjects(); }
}

function onRefresh(){
  if(S.currentTab==='home'){ S.homeData={}; loadHome(); }
  else { S.items=[]; loadProjects(); }
}

function logout(){
  S={token:null,items:[],filter:'All',homeData:{},currentTab:'home'};
  try{ localStorage.removeItem('aveyo_v15'); }catch(e){}
  document.getElementById('auth-user').value=PODIO.user;
  document.getElementById('auth-pass').value=PODIO.pass;
  showView('auth');
  document.getElementById('bnav').style.display='none';
}

async function connectPodio(){
  const user=document.getElementById('auth-user').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const msg=document.getElementById('auth-msg');
  const btn=document.getElementById('btn-connect');
  msg.className='msg msg-info'; msg.textContent='Signing in...'; btn.disabled=true;
  try{
    const res=await fetch('https://podio.com/oauth/token',{
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({grant_type:'password',username:user,password:pass,client_id:PODIO.cid,client_secret:PODIO.csec})
    });
    const data=await res.json();
    if(!data.access_token) throw new Error(data.error_description||'Sign in failed');
    S.token=data.access_token; persist();
    showView('home');
    document.getElementById('bnav').style.display='flex';
    loadHome();
  }catch(e){
    msg.className='msg msg-error'; msg.textContent=e.message; btn.disabled=false;
  }
}

// Fetch view count only (limit:1 to get total)
async function fetchCount(appId, viewId){
  try{
    const res=await fetch(`https://api.podio.com/item/app/${appId}/filter/${viewId}/`,{
      method:'POST',
      headers:{Authorization:'OAuth2 '+S.token,'Content-Type':'application/json'},
      body:JSON.stringify({limit:1,offset:0})
    });
    if(!res.ok) return '—';
    const data=await res.json();
    return data.total!==undefined ? data.total : (data.items||[]).length;
  }catch(e){ return '—'; }
}

// Fetch ticket count (support tickets app has different filter)
async function fetchTicketCount(){
  try{
    const res=await fetch(`https://api.podio.com/item/app/${APPS.tickets}/filter/`,{
      method:'POST',
      headers:{Authorization:'OAuth2 '+S.token,'Content-Type':'application/json'},
      body:JSON.stringify({limit:1,offset:0,filters:{}})
    });
    if(!res.ok) return '—';
    const data=await res.json();
    return data.total!==undefined ? data.total : '—';
  }catch(e){ return '—'; }
}

function dot(){ return '<span class="spin-sm"></span>'; }

async function loadHome(){
  showView('home');
  const c=document.getElementById('home-content');
  c.innerHTML=`
    <div style="text-align:center;padding:2rem;color:var(--text2);font-size:13px">
      <div class="spinner"></div>Loading dashboard...
    </div>`;

  // Fire all requests in parallel
  const [
    ticketTotal, pipelineNotSet, reviewNeeded,
    sowReady, sowRejections, sowTotal, sowRepReady,
    sowLowRedlines, sowRepPending, sowCustRej, sowCustSent, sowCustReady, roofReviewSOW,
    preInstallReady, preInstallIssues,
    coTotal,
    custUpdate, repUpdate, roofReview,
    qAll
  ] = await Promise.all([
    fetchTicketCount(),
    fetchCount(APPS.project, VIEWS.pipelineNotSet),
    fetchCount(APPS.project, VIEWS.reviewNeeded),
    fetchCount(APPS.scopeOfWork, VIEWS.sowReady),
    fetchCount(APPS.scopeOfWork, VIEWS.sowRejections),
    fetchCount(APPS.scopeOfWork, VIEWS.sowTotal),
    fetchCount(APPS.scopeOfWork, VIEWS.sowRepReady),
    fetchCount(APPS.scopeOfWork, VIEWS.sowLowRedlines),

async function loadProjects(){
  showView('projects');
  document.getElementById('cards-loading').style.display='block';
  document.getElementById('cards-list').innerHTML='';
  document.getElementById('progress-bar').style.width='5%';
  try{
    let all=[],offset=0,total=null;
    while(true){
      document.getElementById('loading-msg').textContent=`Loading projects... (${all.length}${total?' of '+total:''})`;
      if(total) document.getElementById('progress-bar').style.width=Math.min(90,Math.round(all.length/total*100))+'%';
      const res=await fetch(`https://api.podio.com/item/app/${PODIO.appId}/filter/${PODIO.viewId}/`,{
        method:'POST',
        headers:{Authorization:'OAuth2 '+S.token,'Content-Type':'application/json'},
        body:JSON.stringify({limit:100,offset,sort_by:'last_edit_on',sort_desc:true})
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error_description||'HTTP '+res.status);}
      const data=await res.json();
      if(data.total!==undefined&&total===null) total=data.total;
      const batch=data.items||[];
      all=all.concat(batch);
      if(batch.length<100||(total!==null&&all.length>=total)) break;
      offset+=100;
    }
    document.getElementById('progress-bar').style.width='100%';
    S.items=all.map(parseItem);
    renderProjStats(); renderChips(); renderCards();
  }catch(e){
    document.getElementById('cards-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}<br><br><small>Try signing out and back in.</small></div>`;
  }finally{
    document.getElementById('cards-loading').style.display='none';
  }
}

function fv(item,fid){
  const f=(item.fields||[]).find(f=>f.field_id===fid);
  if(!f||!f.values||!f.values.length) return '';
  const v=f.values[0];
  if(v.value&&v.value.text) return v.value.text;
  if(v.start_date) return v.start_date;
  if(v.start) return v.start.split(' ')[0];
  if(v.value!==undefined){if(typeof v.value==='object'&&v.value!==null) return v.value.text||v.value.name||''; return String(v.value);}
  return v.text||'';
}
function fnum(item,fid){
  const f=(item.fields||[]).find(f=>f.field_id===fid);
  if(!f||!f.values||!f.values.length) return null;
  const v=f.values[0];
  if(v.value!==undefined) return Math.round(parseFloat(v.value));
  return null;
}
function stripHtml(h){return (h||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();}
function parseTitle(t){
  const m=(t||'').match(/^(#\S+)\s+(.+?)\s+-\s+(.+)$/);
  if(m) return {projectNum:m[1],name:m[2],address:m[3]};
  return {projectNum:'',name:t||'',address:''};
}
function parseItem(raw){
  const {projectNum,name,address}=parseTitle(raw.title);
  return {
    id:raw.item_id, projectNum, name, address, title:raw.title||'',
    status:fv(raw,F.status), milestoneStatus:fv(raw,F.milestoneStatus),
    lastReview:fv(raw,F.lastReview), notes:stripHtml(fv(raw,F.notes)),
    fundingStatus:fv(raw,F.fundingStatus), lender:fv(raw,F.lender),
    financeType:fv(raw,F.financeType), daysSince:fnum(raw,F.daysSince),
    comments:fv(raw,F.projectComments), workOrders:fv(raw,F.workOrders),
    repTickets:fv(raw,F.repTicketsList), raw
  };
}

function msClass(ms){
  if(!ms) return 'ms-default';
  const s=ms.toLowerCase();
  if(s.includes('packet')) return 'ms-packet';
  if(s.includes('survey')) return 'ms-survey';
  if(s.includes('design')) return 'ms-design';
  if(s==='ntp') return 'ms-ntp';
  if(s.includes('scope')) return 'ms-scope';
  if(s.includes('utility')) return 'ms-utility';
  if(s.includes('permit')) return 'ms-permit';
  if(s.includes('install ready')) return 'ms-install';
  if(s.includes('install')) return 'ms-install';
  if(s.includes('inspect')) return 'ms-inspect';
  if(s.includes('pto')) return 'ms-pto';
  if(s.includes('complet')||s.includes('done')) return 'ms-complete';
  if(s.includes('hold')) return 'ms-hold';
  if(s.includes('cancel')) return 'ms-cancel';
  if(s.includes('hoa')) return 'ms-survey';
  return 'ms-default';
}

const MS_COLORS={
  'Packet Approval':'#7F77DD','Site Survey':'#BA7517','Design':'#D4537E',
  'NTP':'#185FA5','Scope of Work':'#185FA5','Utility Pre-Install Docs':'#1D9E75',
  'Utility':'#1D9E75','Permits':'#BA7517','Permit':'#BA7517',
  'Install Ready':'#185FA5','Install':'#185FA5','Inspection':'#534AB7',
  'PTO':'#0F6E56','Complete':'#3B6D11','HOA Approval':'#BA7517',
  'On Hold':'#A32D2D','Cancelled':'#A32D2D'
};
function chipColor(ms){
  const k=Object.keys(MS_COLORS).find(k=>ms&&ms.toLowerCase().includes(k.toLowerCase()));
  return k?MS_COLORS[k]:'#888780';
}

function renderProjStats(){
  const items=S.items;
  const overdue=items.filter(i=>i.daysSince!==null&&i.daysSince>7).length;
  const active=items.filter(i=>(i.status||'').toLowerCase().includes('active')).length;
  document.getElementById('proj-stats').innerHTML=`
    <div style="background:var(--bg);border-radius:var(--radius);padding:.75rem;text-align:center;border:.5px solid var(--border)"><div style="font-size:24px;font-weight:700;color:var(--text)">${items.length}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Total</div></div>
    <div style="background:var(--bg);border-radius:var(--radius);padding:.75rem;text-align:center;border:.5px solid var(--border)"><div style="font-size:24px;font-weight:700;color:#185FA5">${active}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Active</div></div>
    <div style="background:var(--bg);border-radius:var(--radius);padding:.75rem;text-align:center;border:.5px solid var(--border)"><div style="font-size:24px;font-weight:700;color:var(--amber-dark)">${overdue}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Review &gt;7d</div></div>
  `;
}

function renderChips(){
  const statuses=['All',...new Set(S.items.map(i=>i.milestoneStatus).filter(Boolean))];
  document.getElementById('filter-chips').innerHTML=statuses.slice(0,14).map(s=>{
    const active=s===S.filter;
    const color=active?chipColor(s):'';
    const style=active?`background:${color};border-color:${color};`:'';
    return `<button class="chip ${active?'active':''}" style="${style}" onclick="setFilter(${JSON.stringify(s)})">${esc(s)}</button>`;
  }).join('');
}

function setFilter(f){S.filter=f;renderChips();renderCards();}

function renderCards(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  let items=S.items;
  if(S.filter!=='All') items=items.filter(i=>i.milestoneStatus===S.filter);
  if(q) items=items.filter(i=>[i.name,i.address,i.milestoneStatus,i.status,i.notes,i.projectNum].join(' ').toLowerCase().includes(q));
  if(!items.length){document.getElementById('cards-list').innerHTML='<div class="empty">No projects match your search.</div>';return;}
  document.getElementById('cards-list').innerHTML=items.map(item=>{
    const warn=item.daysSince!==null&&item.daysSince>7;
    return `<div class="card" onclick="showDetail(${item.id})">
      <div class="card-id">${esc(item.projectNum)}</div>
      <div class="card-top"><div class="card-name">${esc(item.name)}</div><span class="badge ${msClass(item.milestoneStatus)}">${esc(item.milestoneStatus)||esc(item.status)||'—'}</span></div>
      ${item.address?`<div class="card-addr">${esc(item.address)}</div>`:''}
      <div class="card-meta">
        ${item.lastReview?`<span class="meta ${warn?'warn':''}"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${esc(item.lastReview)}${item.daysSince!==null?' · '+item.daysSince+'d ago':''}</span>`:''}
        ${item.lender?`<span class="meta"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>${esc(item.lender)}</span>`:''}
      </div>
      ${item.notes?`<div class="card-note">${esc(item.notes.substring(0,140))}${item.notes.length>140?'...':''}</div>`:''}
    </div>`;
  }).join('');
}

function toggleColl(el){el.closest('.collapsible').classList.toggle('open');}

function parseCommentBlocks(raw){
  if(!raw) return [];
  return raw.split(/\*{3}/).map(b=>b.trim()).filter(Boolean).slice(0,20);
}
function parseWOBlocks(raw){
  if(!raw) return [];
  return raw.split(/\\---|\n---\n/).map(b=>b.trim()).filter(b=>b.includes('WO-')||b.includes('Type:')).slice(0,10);
}
function parseTicketBlocks(raw){
  if(!raw) return [];
  return raw.split(/\\---|\n---\n/).map(b=>b.trim()).filter(b=>b.includes('Ticket')||b.includes('Status:')).slice(0,10);
}

function showDetail(itemId){
  const item=S.items.find(i=>i.id===itemId);
  if(!item) return;

  const infoRows=[
    {k:'Project status',v:item.status},{k:'Milestone',v:item.milestoneStatus},
    {k:'Lender',v:item.lender},{k:'Finance type',v:item.financeType},
    {k:'Funding status',v:item.fundingStatus},{k:'Last review',v:item.lastReview},
    {k:'Days since review',v:item.daysSince!==null?item.daysSince+' days':''}
  ].filter(r=>r.v);

  const commentBlocks=parseCommentBlocks(item.comments);
  const commentsHtml=commentBlocks.length?commentBlocks.map(b=>{
    const lines=b.split('\n').map(l=>l.trim()).filter(Boolean);
    const dateLine=lines[0]&&lines[0].match(/^(\d{4}-\d{2}-\d{2})\s+\d{2}:\d{2}:\d{2}\s+(.+)/);
    const date=dateLine?dateLine[1]:'';
    const ctx=dateLine?dateLine[2]:'';
    const body=lines.slice(dateLine?1:0).join(' ');
    return `<div class="te"><div class="te-date">${esc(date)}${ctx?' · '+esc(ctx):''}</div><div class="te-body">${esc(body.substring(0,300))}${body.length>300?'...':''}</div></div>`;
  }).join(''):'<div class="te"><div class="te-body" style="color:var(--text3)">No comments yet.</div></div>';

  const woBlocks=parseWOBlocks(item.workOrders);
  const woHtml=woBlocks.length?woBlocks.map(b=>{
    const status=(b.match(/Status:\*?\*?\s*([^\n<*]+)/i)||[])[1]||'';
    const type=(b.match(/Type:\*?\*?\s*([^\n<*]+)/i)||[])[1]||'';
    const appt=(b.match(/Appointment:\*?\*?\s*([^\n<*]+)/i)||[])[1]||'';
    const desc=(b.match(/Description:\*?\*?\s*([^\n<*]+)/i)||[])[1]||'';
    const woId=(b.match(/\[WO-(\d+)\]/)||[])[1]||'';
    const sCls=status.toLowerCase().includes('complet')?'ts-complete':status.toLowerCase().includes('cancel')?'':'ts-open';
    return `<div class="te"><div class="te-date">${woId?'WO-'+woId:''} ${appt?'· '+esc(appt.trim()):''}</div>${type?`<div style="font-weight:600;font-size:12px;color:var(--text)">${esc(type.trim())}</div>`:''} ${desc?`<div class="te-body">${esc(desc.trim().substring(0,200))}</div>`:''} ${status?`<span class="te-status ${sCls}">${esc(status.trim())}</span>`:''}</div>`;
  }).join(''):'<div class="te"><div class="te-body" style="color:var(--text3)">No work orders.</div></div>';

  const ticketBlocks=parseTicketBlocks(item.repTickets);
  const ticketsHtml=ticketBlocks.length?ticketBlocks.map(b=>{
    const status=(b.match(/Status:\*?\*?\s*([^\n<*\[]+)/i)||[])[1]||'';
    const desc=(b.match(/Description:\*?\*?\s*([^\n]+)/i)||[])[1]||'';
    const date=(b.match(/^(\d{2}\/\d{2}\/\d{4})/)||[])[1]||'';
    const tid=(b.match(/Ticket #(\d+)/i)||[])[1]||'';
    const sCls=status.toLowerCase().includes('complet')?'ts-complete':status.toLowerCase().includes('assign')?'ts-assigned':'ts-open';
    return `<div class="te"><div class="te-date">${date?esc(date):''} ${tid?'· Ticket #'+tid:''}</div>${desc?`<div class="te-body">${esc(desc.trim().substring(0,200))}</div>`:''} ${status?`<span class="te-status ${sCls}">${esc(status.trim())}</span>`:''}</div>`;
  }).join(''):'<div class="te"><div class="te-body" style="color:var(--text3)">No support tickets.</div></div>';

  document.getElementById('detail-body').innerHTML=`
    <div class="detail-hdr">
      <div class="detail-id">${esc(item.projectNum)}</div>
      <div class="detail-name">${esc(item.name)}</div>
      ${item.address?`<div class="detail-addr">${esc(item.address)}</div>`:''}
      <span class="badge ${msClass(item.milestoneStatus)}">${esc(item.milestoneStatus)||esc(item.status)||'—'}</span>
    </div>
    <div class="collapsible open">
      <div class="coll-hdr" onclick="toggleColl(this)"><span class="coll-title">Project details</span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="coll-body">${infoRows.map(r=>`<div class="drow"><span class="dk">${esc(r.k)}</span><span class="dv">${esc(String(r.v))}</span></div>`).join('')}</div>
    </div>
    ${item.notes?`<div class="collapsible open"><div class="coll-hdr" onclick="toggleColl(this)"><span class="coll-title">Project notes</span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="coll-body"><div class="notes-body">${esc(item.notes)}</div></div></div>`:''}
    <div class="collapsible"><div class="coll-hdr" onclick="toggleColl(this)"><span class="coll-title">Project comments <span class="cnt">${commentBlocks.length}</span></span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="coll-body">${commentsHtml}</div></div>
    <div class="collapsible"><div class="coll-hdr" onclick="toggleColl(this)"><span class="coll-title">Work orders <span class="cnt">${woBlocks.length}</span></span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="coll-body">${woHtml}</div></div>
    <div class="collapsible"><div class="coll-hdr" onclick="toggleColl(this)"><span class="coll-title">Support tickets <span class="cnt">${ticketBlocks.length}</span></span><svg class="coll-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="coll-body">${ticketsHtml}</div></div>
    <div style="padding:0 .75rem;margin-top:.5rem">
      <a href="https://podio.com/aveyo/projects/apps/project/items/${esc(String(item.id))}" target="_blank"><button class="btn btn-outline" style="font-size:12px">Open in Podio</button></a>
    </div>
  `;
  showView('detail');
  document.getElementById('nav-projects').classList.add('active');
  document.getElementById('nav-home').classList.remove('active');
}
